<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bolão Copa 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #00c853;
    --green-dim: #00963e;
    --gold: #ffd600;
    --silver: #b0bec5;
    --bronze: #ff7043;
    --bg: #0a0f0a;
    --surface: #111711;
    --surface2: #192119;
    --border: rgba(0,200,83,0.12);
    --border2: rgba(0,200,83,0.25);
    --text: #e8f5e9;
    --muted: #607d63;
    --red: #ff4444;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* GRID BACKGROUND */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,200,83,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,200,83,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 0 20px 60px; }

  /* HEADER */
  header {
    padding: 40px 0 32px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    border-bottom: 1px solid var(--border2);
    margin-bottom: 36px;
    flex-wrap: wrap;
    gap: 16px;
  }
  .header-left h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(40px, 8vw, 72px);
    letter-spacing: 2px;
    line-height: 0.9;
    color: var(--green);
    text-shadow: 0 0 40px rgba(0,200,83,0.3);
  }
  .header-left h1 span { color: var(--gold); }
  .header-left p { color: var(--muted); font-size: 13px; margin-top: 8px; letter-spacing: 1px; text-transform: uppercase; }
  .status-badge {
    display: flex; align-items: center; gap: 8px;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 100px;
    padding: 8px 16px;
    font-size: 12px;
    font-family: 'DM Mono', monospace;
    color: var(--muted);
    white-space: nowrap;
  }
  .status-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--muted);
    transition: background 0.3s;
  }
  .status-dot.live { background: var(--green); box-shadow: 0 0 8px var(--green); animation: pulse 2s infinite; }
  .status-dot.loading { background: var(--gold); box-shadow: 0 0 8px var(--gold); animation: pulse 1s infinite; }
  .status-dot.error { background: var(--red); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  /* RANKING */
  .section-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 2px;
    color: var(--muted);
    margin-bottom: 16px;
    display: flex; align-items: center; gap: 10px;
  }
  .section-title::after { content:''; flex:1; height:1px; background: var(--border); }

  .ranking-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 12px;
    margin-bottom: 48px;
  }
  .player-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    transition: border-color 0.2s, transform 0.2s;
    position: relative;
    overflow: hidden;
  }
  .player-card:hover { border-color: var(--border2); transform: translateY(-2px); }
  .player-card.pos-1 { border-color: rgba(255,214,0,0.4); background: linear-gradient(135deg, #192119, #1a1900); }
  .player-card.pos-2 { border-color: rgba(176,190,197,0.3); background: linear-gradient(135deg, #192119, #141a1c); }
  .player-card.pos-3 { border-color: rgba(255,112,67,0.3); background: linear-gradient(135deg, #192119, #1c1410); }
  .player-card.pos-last { border-color: rgba(255,68,68,0.2); }

  .pos-medal {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    min-width: 44px;
    text-align: center;
    line-height: 1;
  }
  .pos-1 .pos-medal { color: var(--gold); text-shadow: 0 0 20px rgba(255,214,0,0.5); }
  .pos-2 .pos-medal { color: var(--silver); }
  .pos-3 .pos-medal { color: var(--bronze); }
  .pos-medal.normal { color: var(--muted); font-size: 22px; }

  .player-info { flex: 1; }
  .player-name {
    font-size: 17px;
    font-weight: 600;
    display: flex; align-items: center; gap: 8px;
  }
  .ia-badge {
    font-size: 9px; font-family: 'DM Mono', monospace;
    background: rgba(0,200,83,0.15); color: var(--green);
    border: 1px solid rgba(0,200,83,0.3);
    padding: 2px 6px; border-radius: 4px; letter-spacing: 1px;
  }
  .player-stats {
    display: flex; gap: 16px; margin-top: 6px;
    font-size: 12px; color: var(--muted); font-family: 'DM Mono', monospace;
  }
  .player-stats span { display: flex; flex-direction: column; }
  .player-stats .stat-val { color: var(--text); font-size: 13px; font-weight: 500; }
  .player-pts {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 38px;
    color: var(--green);
    line-height: 1;
    min-width: 60px;
    text-align: right;
  }
  .player-pts small { font-family: 'DM Sans', sans-serif; font-size: 11px; color: var(--muted); font-weight: 400; display: block; text-align: right; }

  /* JOGOS */
  .tabs {
    display: flex; gap: 4px; margin-bottom: 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px; padding: 4px;
    width: fit-content; flex-wrap: wrap;
  }
  .tab {
    padding: 7px 16px; border-radius: 7px;
    font-size: 13px; font-weight: 500;
    cursor: pointer; border: none;
    background: transparent; color: var(--muted);
    transition: all 0.2s; font-family: 'DM Sans', sans-serif;
  }
  .tab.active { background: var(--surface2); color: var(--green); border: 1px solid var(--border2); }
  .tab:hover:not(.active) { color: var(--text); }

  .games-list { display: flex; flex-direction: column; gap: 8px; }
  .game-row {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 18px;
    display: grid;
    grid-template-columns: 80px 1fr auto 1fr 100px;
    align-items: center;
    gap: 12px;
    transition: border-color 0.2s;
  }
  .game-row:hover { border-color: var(--border2); }
  .game-row.played { border-color: rgba(0,200,83,0.2); }
  .game-num { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); }
  .game-date { font-size: 11px; color: var(--muted); }
  .team { display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 500; }
  .team.right { justify-content: flex-end; flex-direction: row-reverse; }
  .team-flag { width: 22px; height: 16px; object-fit: contain; border-radius: 2px; }
  .score-box {
    display: flex; align-items: center; justify-content: center; gap: 6px;
    font-family: 'Bebas Neue', sans-serif; font-size: 24px; color: var(--green);
    min-width: 70px; text-align: center;
  }
  .score-box.tbd { font-family: 'DM Mono', monospace; font-size: 16px; color: var(--muted); }
  .score-sep { color: var(--muted); font-size: 18px; }
  .game-phase { font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; text-align: right; white-space: nowrap; }

  /* LOADING */
  .loading-screen {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: 300px; gap: 20px;
  }
  .spinner {
    width: 40px; height: 40px;
    border: 2px solid var(--border2);
    border-top-color: var(--green);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { color: var(--muted); font-family: 'DM Mono', monospace; font-size: 13px; }

  /* ERROR */
  .error-box {
    background: rgba(255,68,68,0.08); border: 1px solid rgba(255,68,68,0.3);
    border-radius: 10px; padding: 20px; color: var(--red); font-size: 14px;
    display: flex; align-items: flex-start; gap: 12px;
  }

  /* UPDATE BAR */
  .update-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--surface); border-top: 1px solid var(--border2);
    padding: 10px 24px;
    display: flex; align-items: center; justify-content: space-between;
    z-index: 100; font-size: 12px; color: var(--muted);
    font-family: 'DM Mono', monospace;
  }
  .update-bar button {
    background: var(--surface2); border: 1px solid var(--border2); color: var(--green);
    padding: 5px 14px; border-radius: 6px; cursor: pointer;
    font-size: 12px; font-family: 'DM Mono', monospace;
    transition: all 0.2s;
  }
  .update-bar button:hover { background: rgba(0,200,83,0.1); }
  .timer-bar {
    height: 2px; background: var(--border2);
    position: fixed; bottom: 41px; left: 0;
    transition: width 1s linear;
    background: linear-gradient(90deg, var(--green), var(--gold));
  }

  /* PALPITES MODAL */
  .palpites-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(130px,1fr)); gap: 8px;
    margin-top: 8px;
  }
  .palpite-chip {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; padding: 8px 10px; font-size: 12px;
  }
  .palpite-chip .pname { color: var(--muted); font-size: 10px; font-family: 'DM Mono', monospace; margin-bottom: 3px; }
  .palpite-chip .pval { color: var(--text); font-weight: 500; font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 1px; }
  .palpite-chip.correct { border-color: rgba(0,200,83,0.4); background: rgba(0,200,83,0.08); }
  .palpite-chip.wrong { border-color: rgba(255,68,68,0.2); }

  .collapsible { cursor: pointer; }
  .collapsible-content { display: none; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); }
  .game-row.expanded .collapsible-content { display: block; }
  .game-row.expanded { border-color: var(--border2); }

  .expand-icon { font-size: 12px; color: var(--muted); margin-left: auto; transition: transform 0.2s; }
  .game-row.expanded .expand-icon { transform: rotate(180deg); }

  @media (max-width: 600px) {
    .game-row { grid-template-columns: 60px 1fr auto 1fr 70px; gap: 8px; padding: 12px; }
    .team { font-size: 12px; }
    .score-box { font-size: 20px; min-width: 54px; }
    .ranking-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="header-left">
      <h1>BOLÃO<br><span>COPA 26</span></h1>
      <p>Copa do Mundo · 8 participantes + IA</p>
    </div>
    <div class="status-badge">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">Conectando...</span>
    </div>
  </header>

  <div id="app">
    <div class="loading-screen">
      <div class="spinner"></div>
      <div class="loading-text">Carregando dados da planilha...</div>
    </div>
  </div>
</div>

<!-- BOTTOM BAR -->
<div class="update-bar">
  <span id="lastUpdate">—</span>
  <button onclick="forceRefresh()">↻ Atualizar agora</button>
</div>
<div class="timer-bar" id="timerBar" style="width:100%"></div>

<script>
const SPREADSHEET_ID = '1DVLPCm8xLxRFsadiEW_89_H3GE9cv5YAyNY5CI3jrzM';
const REFRESH_INTERVAL = 60; // seconds
let countdown = REFRESH_INTERVAL;
let timerInterval;
let data = null;

// ---- FLAGS ----
const FLAGS = {
  'México':'https://s.sde.globo.com/media/organizations/2022/12/01/Mexico.svg',
  'África do Sul':'https://s.sde.globo.com/media/organizations/2019/09/09/%C3%81frica_do_Sul.svg',
  'Coréia do Sul':'https://s.sde.globo.com/media/organizations/2019/09/01/Coreia_do_Sul.svg',
  'Tchéquia':'https://s.sde.globo.com/media/organizations/2019/09/03/Rep._Tcheca_u3JArFF.svg',
  'Canadá':'https://s.sde.globo.com/media/organizations/2022/12/01/Canada.svg',
  'Bósnia':'https://s.sde.globo.com/media/organizations/2019/09/15/B%C3%B3snia.svg',
  'Catar':'https://s.sde.globo.com/media/organizations/2019/09/06/Catar.svg',
  'Suíça':'https://s.sde.globo.com/media/organizations/2022/12/01/Suica.svg',
  'Brasil':'https://s.sde.globo.com/media/organizations/2019/07/16/Brasil_rgYHF6Z.svg',
  'Marrocos':'https://s.sde.globo.com/media/organizations/2019/09/10/Marrocos.svg',
  'Haiti':'https://s.sde.globo.com/media/organizations/2019/07/14/Haiti.svg',
  'Escócia':'https://s.sde.globo.com/media/organizations/2019/09/15/Esc%C3%B3cia.svg',
  'Estados Unidos':'https://s.sde.globo.com/media/organizations/2019/07/16/Estados_Unidos.svg',
  'Paraguai':'https://s.sde.globo.com/media/organizations/2019/07/15/Paraguai.svg',
  'Austrália':'https://s.sde.globo.com/media/organizations/2019/09/02/Australia.svg',
  'Turquia':'https://s.sde.globo.com/media/organizations/2019/09/03/Turquia_i5NWJC8.svg',
  'Alemanha':'https://s.sde.globo.com/media/organizations/2019/09/03/Alemanha.svg',
  'Curaçao':'https://s.sde.globo.com/media/organizations/2019/07/14/Cura%C3%A7ao.svg',
  'Costa do Marfim':'https://s.sde.globo.com/media/organizations/2019/09/03/Costa_do_Marfim.svg',
  'Equador':'https://s.sde.globo.com/media/organizations/2019/07/15/Equador.svg',
  'Holanda':'https://s.sde.globo.com/media/organizations/2019/09/16/Holanda.svg',
  'Japão':'https://s.sde.globo.com/media/organizations/2019/09/03/Japao.svg',
  'Suécia':'https://s.sde.globo.com/media/organizations/2019/09/15/Su%C3%A9cia.svg',
  'Tunísia':'https://s.sde.globo.com/media/organizations/2024/05/02/Tunisia.svg',
  'Bélgica':'https://s.sde.globo.com/media/organizations/2022/12/01/Belgica.svg',
  'Egito':'https://s.sde.globo.com/media/organizations/2019/09/08/Egito.svg',
  'Irã':'https://s.sde.globo.com/media/organizations/2019/09/01/Ir%C3%A3.svg',
  'Nova Zelândia':'https://s.sde.globo.com/media/organizations/2019/09/01/Nova_Zelandia.svg',
  'Espanha':'https://s.sde.globo.com/media/organizations/2019/09/03/Espanha.svg',
  'Cabo Verde':'https://s.sde.globo.com/media/organizations/2019/09/08/Cabo_Verde.svg',
  'Arábia Saudita':'https://s.sde.globo.com/media/organizations/2022/12/01/Arabia_Saudita.svg',
  'Uruguai':'https://s.sde.globo.com/media/organizations/2019/07/16/Uruguai.svg',
  'França':'https://s.sde.globo.com/media/organizations/2022/12/01/Franca.svg',
  'Senegal':'https://s.sde.globo.com/media/organizations/2019/09/03/Senegal.svg',
  'Iraque':'https://s.sde.globo.com/media/organizations/2019/09/07/Iraque.svg',
  'Noruega':'https://s.sde.globo.com/media/organizations/2019/09/15/Noruega.svg',
  'Argentina':'https://s.sde.globo.com/media/organizations/2019/07/15/Argentina.svg',
  'Argélia':'https://s.sde.globo.com/media/organizations/2019/09/08/Arg%C3%A9lia.svg',
  'Áustria':'https://s.sde.globo.com/media/organizations/2019/09/17/%C3%81ustria.svg',
  'Jordânia':'https://s.sde.globo.com/media/organizations/2019/09/03/Jordania.svg',
  'Portugal':'https://s.sde.globo.com/media/organizations/2019/09/17/Portugal.svg',
  'RD Congo':'https://s.sde.globo.com/media/organizations/2019/09/10/RD_Congo.svg',
  'Uzbequistão':'https://s.sde.globo.com/media/organizations/2019/09/08/Uzbequist%C3%A3o.svg',
  'Colômbia':'https://s.sde.globo.com/media/organizations/2019/07/14/Colombia.svg',
  'Inglaterra':'https://s.sde.globo.com/media/organizations/2019/09/13/Inglaterra.svg',
  'Croácia':'https://s.sde.globo.com/media/organizations/2022/12/01/Croacia.svg',
  'Gana':'https://s.sde.globo.com/media/organizations/2019/09/08/Gana.svg',
  'Panamá':'https://s.sde.globo.com/media/organizations/2019/07/15/Panama.svg',
};

function flagImg(team) {
  if (!team || !FLAGS[team]) return '';
  return `<img class="team-flag" src="${FLAGS[team]}" alt="${team}" onerror="this.style.display='none'">`;
}

// ---- FETCH DATA via Claude API ----
async function fetchData() {
  setStatus('loading', 'Atualizando...');
  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: `Você é um extrator de dados de planilhas de bolão de futebol. 
Leia a planilha do Google Drive com ID: ${SPREADSHEET_ID} usando o MCP do Google Drive.
Extraia e retorne APENAS um JSON válido (sem markdown, sem explicações) com esta estrutura exata:

{
  "ranking": [
    {"pos": 1, "nome": "Junin", "pontos": 0, "cravadas": 0, "corretos": 0, "fase_grupos": 0, "mata_mata": 0}
  ],
  "jogos": [
    {"num": 1, "data": "11/06/2026", "hora": "16h", "time1": "México", "time2": "África do Sul", "gols1": null, "gols2": null, "rodada": "1ª rodada",
     "palpites": [{"nome":"Junin","g1":2,"g2":0},{"nome":"Binho","g1":2,"g2":0}]}
  ],
  "ultima_atualizacao": "08/06 11:44"
}

Para o ranking, use os dados da tabela de classificação.
Para os jogos da fase de grupos (jogos 1-72), inclua os resultados (gols1/gols2 como números inteiros, ou null se ainda não jogado) e os palpites de cada participante.
Inclua apenas os primeiros 36 jogos (já disputados ou próximos) para não exceder o limite.
RETORNE APENAS O JSON, nada mais.`,
        messages: [{ role: 'user', content: 'Extraia os dados do bolão agora.' }],
        mcp_servers: [{
          type: 'url',
          url: 'https://drivemcp.googleapis.com/mcp/v1',
          name: 'google-drive'
        }]
      })
    });

    const raw = await response.json();
    
    // Extract text from response
    let text = '';
    if (raw.content) {
      for (const block of raw.content) {
        if (block.type === 'text') text += block.text;
      }
    }

    // Parse JSON
    text = text.replace(/```json|```/g, '').trim();
    const parsed = JSON.parse(text);
    data = parsed;
    
    setStatus('live', `Atualizado às ${new Date().toLocaleTimeString('pt-BR', {hour:'2-digit',minute:'2-digit'})}`);
    document.getElementById('lastUpdate').textContent = `Última atualização: ${new Date().toLocaleTimeString('pt-BR')}`;
    render();
    resetTimer();
  } catch (e) {
    console.error(e);
    setStatus('error', 'Erro ao carregar');
    if (!data) renderError(e.message);
  }
}

function setStatus(type, text) {
  const dot = document.getElementById('statusDot');
  const txt = document.getElementById('statusText');
  dot.className = 'status-dot ' + type;
  txt.textContent = text;
}

// ---- RENDER ----
let activeTab = 'todos';

function render() {
  if (!data) return;
  const app = document.getElementById('app');
  app.innerHTML = `
    ${renderRanking()}
    ${renderJogos()}
  `;
}

function renderRanking() {
  if (!data.ranking || !data.ranking.length) return '';
  const sorted = [...data.ranking].sort((a,b) => b.pontos - a.pontos);
  
  return `
    <div class="section-title">Classificação</div>
    <div class="ranking-grid">
      ${sorted.map((p, i) => {
        const pos = i + 1;
        const isLast = pos === sorted.length;
        const medals = {1:'🥇',2:'🥈',3:'🥉'};
        const posClass = pos <= 3 ? `pos-${pos}` : isLast ? 'pos-last' : '';
        const medalHtml = medals[pos] 
          ? `<div class="pos-medal">${medals[pos]}</div>` 
          : `<div class="pos-medal normal">${pos}º</div>`;
        const isIA = p.nome === 'IA';
        return `
          <div class="player-card ${posClass}">
            ${medalHtml}
            <div class="player-info">
              <div class="player-name">
                ${p.nome}
                ${isIA ? '<span class="ia-badge">IA</span>' : ''}
              </div>
              <div class="player-stats">
                <span><span class="stat-val">${p.cravadas ?? 0}</span>cravadas</span>
                <span><span class="stat-val">${p.corretos ?? 0}</span>acertos</span>
                <span><span class="stat-val">${p.fase_grupos ?? 0}</span>grupos</span>
              </div>
            </div>
            <div class="player-pts">
              ${p.pontos ?? 0}
              <small>pts</small>
            </div>
          </div>
        `;
      }).join('')}
    </div>
  `;
}

function renderJogos() {
  if (!data.jogos || !data.jogos.length) return '';
  
  const rodadas = ['todos', ...new Set(data.jogos.map(j => j.rodada).filter(Boolean))];
  const filtered = activeTab === 'todos' ? data.jogos : data.jogos.filter(j => j.rodada === activeTab);
  
  return `
    <div class="section-title">Jogos</div>
    <div class="tabs">
      ${rodadas.map(r => `
        <button class="tab ${activeTab === r ? 'active' : ''}" onclick="setTab('${r}')">${r === 'todos' ? 'Todos' : r}</button>
      `).join('')}
    </div>
    <div class="games-list">
      ${filtered.map(j => renderGame(j)).join('')}
    </div>
  `;
}

function renderGame(j) {
  const played = j.gols1 !== null && j.gols1 !== undefined && j.gols2 !== null && j.gols2 !== undefined;
  const hasPalpites = j.palpites && j.palpites.length > 0;
  
  const scoreHtml = played
    ? `<div class="score-box">${j.gols1}<span class="score-sep">×</span>${j.gols2}</div>`
    : `<div class="score-box tbd">${j.hora || 'TBD'}</div>`;

  const palpitesHtml = hasPalpites ? `
    <div class="collapsible-content">
      <div style="font-size:11px;color:var(--muted);margin-bottom:8px;font-family:'DM Mono',monospace;">PALPITES</div>
      <div class="palpites-grid">
        ${j.palpites.map(p => {
          let correct = false;
          if (played && p.g1 !== null && p.g2 !== null) {
            const resultWinner = j.gols1 > j.gols2 ? 1 : j.gols2 > j.gols1 ? 2 : 0;
            const palpWinner = p.g1 > p.g2 ? 1 : p.g2 > p.g1 ? 2 : 0;
            correct = resultWinner === palpWinner;
          }
          return `
            <div class="palpite-chip ${correct ? 'correct' : played ? 'wrong' : ''}">
              <div class="pname">${p.nome}</div>
              <div class="pval">${p.g1 ?? '?'}×${p.g2 ?? '?'}</div>
            </div>
          `;
        }).join('')}
      </div>
    </div>
  ` : '';

  return `
    <div class="game-row ${played ? 'played' : ''}" id="game-${j.num}" ${hasPalpites ? 'onclick="toggleGame('+j.num+')"' : ''}>
      <div>
        <div class="game-num">#${j.num}</div>
        <div class="game-date">${j.data || ''}</div>
      </div>
      <div class="team">${flagImg(j.time1)}<span>${j.time1 || '?'}</span></div>
      ${scoreHtml}
      <div class="team right"><span>${j.time2 || '?'}</span>${flagImg(j.time2)}</div>
      <div style="display:flex;align-items:center;justify-content:flex-end;gap:8px;">
        <div class="game-phase">${j.rodada || ''}</div>
        ${hasPalpites ? '<div class="expand-icon">▼</div>' : ''}
      </div>
      ${palpitesHtml}
    </div>
  `;
}

function toggleGame(num) {
  const el = document.getElementById('game-' + num);
  if (el) el.classList.toggle('expanded');
}

function setTab(tab) {
  activeTab = tab;
  render();
}

function renderError(msg) {
  document.getElementById('app').innerHTML = `
    <div class="error-box">
      <div>⚠</div>
      <div>
        <strong>Erro ao carregar dados</strong><br>
        <span style="font-size:12px;opacity:0.7">${msg}</span><br>
        <span style="font-size:12px;opacity:0.5;margin-top:4px;display:block">Certifique-se de que o conector Google Drive está ativo no Claude.ai e tente novamente.</span>
      </div>
    </div>
  `;
}

// ---- TIMER ----
function resetTimer() {
  clearInterval(timerInterval);
  countdown = REFRESH_INTERVAL;
  updateTimerBar();
  timerInterval = setInterval(() => {
    countdown--;
    updateTimerBar();
    if (countdown <= 0) {
      fetchData();
    }
  }, 1000);
}

function updateTimerBar() {
  const pct = (countdown / REFRESH_INTERVAL * 100).toFixed(1);
  document.getElementById('timerBar').style.width = pct + '%';
}

function forceRefresh() { fetchData(); }

// ---- INIT ----
fetchData();
</script>
