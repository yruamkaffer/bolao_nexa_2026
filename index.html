<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Bolão Copa 2026</title>
<meta name="theme-color" content="#071426">
<style>
:root{--bg:#061426;--panel:#0d2138;--panel2:#102b49;--line:rgba(142,205,240,.22);--line2:rgba(142,205,240,.42);--txt:#eef7ff;--muted:#94aec8;--blue:#9bdcff;--orange:#ff8b4a;--gold:#ffd66b;--green:#76efae;--red:#ff7777}
*{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;min-height:100dvh;background:radial-gradient(circle at 18% 0,#143657 0,#07182b 36%,#061426 100%);color:var(--txt);font-family:Arial,Helvetica,sans-serif;overflow-x:hidden}body:before{content:"";position:fixed;inset:0;background-image:linear-gradient(rgba(155,220,255,.055) 1px,transparent 1px),linear-gradient(90deg,rgba(155,220,255,.055) 1px,transparent 1px);background-size:82px 82px;pointer-events:none}.wrap{position:relative;z-index:1;width:min(1120px,100%);margin:auto;padding:26px 18px 72px}header{display:flex;justify-content:space-between;align-items:flex-end;gap:14px;flex-wrap:wrap;margin-bottom:22px}.brand{font-family:Impact,"Arial Black",sans-serif;letter-spacing:.12em;text-transform:uppercase;font-size:clamp(34px,8vw,76px);line-height:.9;color:#dff4ff}.sub{color:var(--muted);font:13px ui-monospace,monospace;letter-spacing:.08em;margin-top:10px}.pill{border:1px solid var(--line2);background:rgba(10,30,52,.78);border-radius:999px;padding:10px 14px;color:var(--muted);font:12px ui-monospace,monospace;display:inline-flex;align-items:center;gap:8px}.dot{width:8px;height:8px;border-radius:50%;background:var(--orange);box-shadow:0 0 10px var(--orange)}.tabs{display:flex;gap:8px;overflow:auto;padding:10px 0 20px}.tab{border:1px solid var(--line);border-radius:999px;padding:11px 15px;color:var(--muted);text-decoration:none;background:rgba(7,22,39,.72);font-weight:800;white-space:nowrap}.tab:hover,.tab.on{background:var(--blue);color:#061426;border-color:var(--blue)}h2{font-family:Impact,"Arial Black",sans-serif;letter-spacing:.17em;text-transform:uppercase;color:#dff4ff;font-size:clamp(30px,6vw,48px);line-height:1.06;margin:42px 0 20px;display:flex;gap:18px;align-items:center}h2:after{content:"";height:2px;background:var(--line);flex:1}.card{border:1px solid var(--line);border-radius:24px;background:linear-gradient(135deg,rgba(19,51,89,.86),rgba(7,22,39,.92));box-shadow:0 20px 55px rgba(0,0,0,.25);overflow:hidden}.hero{border-color:rgba(255,139,74,.62);padding:28px;position:relative}.hero:before,.rankrow:first-child:before{content:"";position:absolute;inset:0 0 auto;height:3px;background:linear-gradient(90deg,var(--orange),var(--gold),transparent)}.round{font:900 15px ui-monospace,monospace;letter-spacing:.18em;text-transform:uppercase;color:#ffb381}.scoreline{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin:16px 0 10px;font-size:clamp(28px,7vw,56px);font-weight:900}.score{font-family:Impact,"Arial Black",sans-serif;color:var(--orange);letter-spacing:.04em}.meta{display:flex;gap:16px;flex-wrap:wrap;color:var(--muted);font-size:17px}.btn{display:block;margin-top:22px;border:1px solid var(--line2);border-radius:999px;padding:14px;text-align:center;text-decoration:none;color:#c8ecff;background:rgba(6,20,36,.55);font-weight:700}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px}.bet{padding:18px;display:flex;justify-content:space-between;align-items:center;gap:12px;min-height:106px}.name{font-size:19px;font-weight:800}.guess{color:var(--muted);font:14px ui-monospace,monospace;margin-top:5px}.pts{font-family:Impact,"Arial Black",sans-serif;font-size:34px;color:var(--blue);text-align:right}.status{font:10px ui-monospace,monospace;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);text-align:right}.best{border-color:rgba(255,214,107,.78);background:linear-gradient(135deg,rgba(255,214,107,.13),rgba(13,32,56,.92))}.best .pts{color:var(--gold)}.rank{display:grid;gap:14px}.rankrow{position:relative;padding:18px;display:grid;grid-template-columns:54px 1fr auto;gap:14px;align-items:center}.medal{width:54px;height:54px;border-radius:18px;display:grid;place-items:center;border:1px solid var(--line2);background:rgba(155,220,255,.10);font-size:23px;font-weight:900}.rankrow:first-child .medal{background:linear-gradient(135deg,var(--gold),var(--orange));color:#071426}.rname{font-size:26px;font-weight:900}.rmeta{color:var(--muted);font:14px ui-monospace,monospace;margin-top:6px}.rpts{font-family:Impact,"Arial Black",sans-serif;font-size:52px;color:var(--blue);line-height:.9;text-align:right}.small{color:var(--muted);font-size:12px;text-align:right}.games{display:grid;gap:12px}.game{display:grid;grid-template-columns:80px 1fr 62px 1fr 42px;gap:10px;align-items:center;padding:16px;border:1px solid var(--line);border-radius:22px;background:rgba(12,33,56,.70)}.gid,.time,.gscore{color:var(--muted);font:14px ui-monospace,monospace;text-align:center}.gid{text-align:left}.team{font-weight:900}.warnbox{padding:16px;color:var(--muted);line-height:1.55}.ok{color:var(--green)}.warn{color:var(--gold)}.footer{text-align:center;color:var(--muted);font:18px ui-monospace,monospace;padding:34px 0 10px;border-top:1px solid var(--line);margin-top:48px}@media(max-width:720px){.grid{grid-template-columns:1fr}.wrap{padding-inline:16px}.game{grid-template-columns:68px 1fr 42px 1fr 24px;padding:14px 10px}.team{font-size:14px}.gid,.time,.gscore{font-size:12px}.footer{font-size:16px}}
</style>
</head>
<body>
<main class="wrap">
<header><div><div class="brand">Bolão Copa 2026</div><div class="sub">painel restaurado · fallback seguro</div></div><div class="pill"><span class="dot"></span><span id="sync">carregando...</span></div></header>
<nav class="tabs"><a class="tab on" href="#ultimo">Último jogo</a><a class="tab" href="#rank">Classificação</a><a class="tab" href="#jogos">Jogos</a><a class="tab" href="#status">Status</a></nav>
<section id="ultimo"><h2>Último jogo atualizado do bolão</h2><div id="lastGame"></div><div id="lastBets" class="grid" style="margin-top:18px"></div></section>
<section id="rank"><h2>Classificação do bolão</h2><div id="ranking" class="rank"></div></section>
<section id="jogos"><h2>Próximos jogos</h2><div id="games" class="games"></div></section>
<section id="status"><h2>Status</h2><div id="statusBox" class="card warnbox"></div></section>
<div class="footer">Feito por Yruam Käffer + ChatGPT Plus para alegria da rapaziada<br>&lt;3 · v8 restaurado</div>
</main>
<script>
const CSV_URL='https://docs.google.com/spreadsheets/d/e/2PACX-1vSsInCRk-l_QEpBvknAIq3Aua_gywvZEi9c95ySWDmUipn3ss6ImJxHqgkx9goZeWyjWEw5FekvCC9m/pub?output=csv';
const PARTICIPANTES=['Junin','Binho','Carlos','Jean','Matheus','Yruam','Rodrigo','Rapha','IA'];
const DATA={
 ranking:[
  {nome:'Jean',pontos:83,cravadas:4,corretos:18},{nome:'Rodrigo',pontos:78,cravadas:2,corretos:17},{nome:'Matheus',pontos:79,cravadas:2,corretos:17},{nome:'Binho',pontos:75,cravadas:1,corretos:16},{nome:'Junin',pontos:70,cravadas:1,corretos:15},{nome:'Rapha',pontos:69,cravadas:1,corretos:15},{nome:'Carlos',pontos:67,cravadas:1,corretos:14},{nome:'Yruam',pontos:65,cravadas:1,corretos:14},{nome:'IA',pontos:60,cravadas:2,corretos:13}
 ],
 jogos:[
  {num:25,data:'18/06',hora:'13h',time1:'Tchéquia',time2:'África do Sul',gols1:1,gols2:1,rodada:'2ª rodada'},
  {num:26,data:'18/06',hora:'16h',time1:'Suíça',time2:'Bósnia',gols1:4,gols2:1,rodada:'2ª rodada'},
  {num:27,data:'18/06',hora:'19h',time1:'Canadá',time2:'Catar',gols1:6,gols2:0,rodada:'2ª rodada'},
  {num:28,data:'18/06',hora:'22h',time1:'México',time2:'Coreia do Sul',gols1:1,gols2:0,rodada:'2ª rodada',palpites:[{nome:'Junin',g1:0,g2:2,pts:0},{nome:'Binho',g1:2,g2:0,pts:5},{nome:'Carlos',g1:2,g2:1,pts:5},{nome:'Jean',g1:2,g2:1,pts:5},{nome:'Matheus',g1:1,g2:0,pts:10},{nome:'Yruam',g1:1,g2:1,pts:2},{nome:'Rodrigo',g1:3,g2:1,pts:5},{nome:'Rapha',g1:2,g2:2,pts:0},{nome:'IA',g1:1,g2:2,pts:0}]},
  {num:29,data:'19/06',hora:'16h',time1:'A definir',time2:'A definir',gols1:null,gols2:null,rodada:'2ª rodada'},
  {num:30,data:'19/06',hora:'19h',time1:'A definir',time2:'A definir',gols1:null,gols2:null,rodada:'2ª rodada'},
  {num:31,data:'19/06',hora:'22h',time1:'A definir',time2:'A definir',gols1:null,gols2:null,rodada:'2ª rodada'},
  {num:96,data:'07/07',hora:'17h',time1:'A definir',time2:'A definir',gols1:null,gols2:null,rodada:'Mata-mata'},
  {num:97,data:'09/07',hora:'17h',time1:'A definir',time2:'A definir',gols1:null,gols2:null,rodada:'Mata-mata'},
  {num:98,data:'10/07',hora:'16h',time1:'A definir',time2:'A definir',gols1:null,gols2:null,rodada:'Mata-mata'},
  {num:99,data:'11/07',hora:'18h',time1:'A definir',time2:'A definir',gols1:null,gols2:null,rodada:'Mata-mata'},
  {num:100,data:'11/07',hora:'22h',time1:'A definir',time2:'A definir',gols1:null,gols2:null,rodada:'Mata-mata'},
  {num:101,data:'14/07',hora:'16h',time1:'A definir',time2:'A definir',gols1:null,gols2:null,rodada:'Mata-mata'},
  {num:102,data:'15/07',hora:'16h',time1:'A definir',time2:'A definir',gols1:null,gols2:null,rodada:'Mata-mata'},
  {num:103,data:'18/07',hora:'18h',time1:'A definir',time2:'A definir',gols1:null,gols2:null,rodada:'Mata-mata'},
  {num:104,data:'19/07',hora:'16h',time1:'A definir',time2:'A definir',gols1:null,gols2:null,rodada:'Final'}
 ]
};
const $=id=>document.getElementById(id);const esc=s=>String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));
function played(j){return j.gols1!==null&&j.gols2!==null}function lastGame(){return [...DATA.jogos].reverse().find(played)||DATA.jogos[0]}function sortRank(){return [...DATA.ranking].sort((a,b)=>b.pontos-a.pontos||b.cravadas-a.cravadas||b.corretos-a.corretos).map((p,i)=>({...p,posicao:i+1}))}
function renderLast(){const j=lastGame();$('lastGame').innerHTML=`<article class="card hero"><div class="round">${esc(j.rodada)}</div><div class="scoreline"><span>${esc(j.time1)}</span><span class="score">${j.gols1}×${j.gols2}</span><span>${esc(j.time2)}</span></div><div class="meta"><span>Jogo #${j.num}</span><span>${esc(j.data)}</span><span>${esc(j.hora)}</span></div><a class="btn" target="_blank" rel="noopener" href="https://ge.globo.com/futebol/copa-do-mundo/">Cobertura da Copa no ge ↗</a></article>`;const bets=(j.palpites||[]);const max=Math.max(...bets.map(b=>b.pts??0));$('lastBets').innerHTML=PARTICIPANTES.map(n=>{const b=bets.find(x=>x.nome===n)||{nome:n,g1:null,g2:null,pts:null};return `<div class="card bet ${(b.pts??-1)===max&&max>0?'best':''}"><div><div class="name">${esc(n)}</div><div class="guess">${b.g1!==null?`${b.g1}×${b.g2}`:'—'}</div></div><div><div class="pts">${b.pts!==null?b.pts:'—'}</div><div class="status">${b.pts!==null?'oficial/snapshot':'aguardando'}</div></div></div>`}).join('')}
function renderRanking(){const s=sortRank(),leader=s[0]?.pontos||0;const medals=['🥇','🥈','🥉'];$('ranking').innerHTML=s.map((p,i)=>`<div class="card rankrow"><div class="medal">${medals[i]||p.posicao+'º'}</div><div><div class="rname">${esc(p.nome)}</div><div class="rmeta">${p.cravadas} cravadas · ${p.corretos} acertos · ${i===0?'líder':'-'+(leader-p.pontos)+' do líder'}</div></div><div><div class="rpts">${p.pontos}</div><div class="small">pts</div></div></div>`).join('')}
function renderGames(){const upcoming=DATA.jogos.filter(j=>!played(j)).slice(0,16);$('games').innerHTML=upcoming.map(j=>`<div class="game"><div class="gid">#${j.num}<br>${esc(j.data)}</div><div class="team">${esc(j.time1)}</div><div class="time">${esc(j.hora)}</div><div class="team">${esc(j.time2)}</div><div class="gscore">—</div></div>`).join('')}
async function tryCsv(){try{const r=await fetch(CSV_URL+'&cb='+Date.now(),{cache:'no-store'});const t=await r.text();if(!r.ok||/^\s*</.test(t)||t.length<20)throw new Error('CSV inválido');$('sync').textContent='snapshot seguro · CSV acessível';$('statusBox').innerHTML='<b class="ok">OK:</b> o site não quebra mais se o CSV falhar. O layout usa snapshot local primeiro e só marca CSV como acessível quando o Google responde direito.'}catch(e){$('sync').textContent='snapshot seguro';$('statusBox').innerHTML='<b class="warn">Aviso:</b> o Google CSV não respondeu corretamente agora, então o painel manteve os dados locais e continua funcionando. Para atualizar 100% ao vivo, o ideal é publicar uma aba consolidada única em CSV e substituir só a URL no topo do arquivo.'}}
function boot(){renderLast();renderRanking();renderGames();tryCsv()}boot();
</script>
</body>
</html>
