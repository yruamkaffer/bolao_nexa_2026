<style>
:root{--green:#00c853;--gold:#ffd600;--silver:#b0bec5;--bronze:#ff7043;--bg:#060c06;--surface:#0d140d;--surface2:#141f14;--surface3:#1a281a;--border:rgba(0,200,83,.10);--border2:rgba(0,200,83,.22);--border3:rgba(0,200,83,.40);--text:#e0efe0;--muted:#4a6b4d;--muted2:#7a9e7d;--red:#ff4444}
*{margin:0;padding:0;box-sizing:border-box}html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,200,83,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(0,200,83,.025) 1px,transparent 1px);background-size:48px 48px;pointer-events:none;z-index:0}
body::after{content:'';position:fixed;top:0;left:0;right:0;height:400px;background:radial-gradient(ellipse 80% 300px at 50% -100px,rgba(0,200,83,.07),transparent);pointer-events:none;z-index:0}
.wrap{position:relative;z-index:1;max-width:1120px;margin:0 auto;padding:0 20px 60px}
header{padding:44px 0 28px;display:flex;align-items:flex-end;justify-content:space-between;border-bottom:1px solid var(--border2);margin-bottom:40px;flex-wrap:wrap;gap:16px}
.hd-left h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(36px,7vw,68px);line-height:.9;letter-spacing:2px;color:var(--green);text-shadow:0 0 60px rgba(0,200,83,.25),0 0 120px rgba(0,200,83,.1)}
.hd-left h1 em{color:var(--gold);font-style:normal}
.hd-left p{margin-top:10px;color:var(--muted2);font-size:12px;letter-spacing:2px;text-transform:uppercase}
.stamp{display:flex;align-items:center;gap:8px;background:var(--surface2);border:1px solid var(--border2);border-radius:100px;padding:9px 18px;font-size:12px;font-family:'DM Mono',monospace;color:var(--muted2);white-space:nowrap}
.dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.stitle{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:3px;color:var(--muted2);margin-bottom:18px;display:flex;align-items:center;gap:12px}
.stitle::after{content:'';flex:1;height:1px;background:var(--border)}
.ranking-wrap{margin-bottom:52px}
.ranking-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:10px}
.pcard{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px 20px;display:flex;align-items:center;gap:14px;transition:border-color .2s,transform .2s;position:relative;overflow:hidden}
.pcard:hover{border-color:var(--border2);transform:translateY(-2px)}
.pcard::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(0,200,83,.15),transparent)}
.pcard.p1{border-color:rgba(255,214,0,.35);background:linear-gradient(135deg,#0d140d,#151200)}
.pcard.p1::before{background:linear-gradient(90deg,transparent,rgba(255,214,0,.3),transparent)}
.pcard.p2{border-color:rgba(176,190,197,.25);background:linear-gradient(135deg,#0d140d,#10141a)}
.pcard.p3{border-color:rgba(255,112,67,.25);background:linear-gradient(135deg,#0d140d,#1a0f0a)}
.pcard.plast{border-color:rgba(255,68,68,.15)}
.medal{font-family:'Bebas Neue',sans-serif;font-size:34px;min-width:46px;text-align:center;line-height:1}
.p1 .medal{color:var(--gold);text-shadow:0 0 20px rgba(255,214,0,.6)}.p2 .medal{color:var(--silver)}.p3 .medal{color:var(--bronze)}.medal.num{font-size:22px;color:var(--muted)}
.pinfo{flex:1;min-width:0}
.pname{font-size:16px;font-weight:600;display:flex;align-items:center;gap:7px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ia-tag{font-size:9px;font-family:'DM Mono',monospace;background:rgba(0,200,83,.12);color:var(--green);border:1px solid rgba(0,200,83,.3);padding:2px 6px;border-radius:4px;letter-spacing:1px;flex-shrink:0}
.pstats{display:flex;gap:14px;margin-top:7px;font-size:11px;color:var(--muted2);font-family:'DM Mono',monospace}
.pstats span{display:flex;flex-direction:column;gap:1px}.pstats b{color:var(--text);font-size:13px;font-weight:500}
.ppts{font-family:'Bebas Neue',sans-serif;font-size:40px;color:var(--green);line-height:1;min-width:62px;text-align:right}
.ppts small{font-family:'DM Sans',sans-serif;font-size:10px;color:var(--muted2);font-weight:400;display:block;text-align:right;letter-spacing:1px}
.camp-banner{background:linear-gradient(135deg,var(--surface),#1a1500);border:1px solid rgba(255,214,0,.3);border-radius:14px;padding:16px 24px;margin-bottom:28px;display:flex;flex-wrap:wrap;gap:16px;align-items:center}
.camp-banner h3{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;color:var(--gold);margin-right:4px}
.camp-chips{display:flex;gap:8px;flex-wrap:wrap}
.camp-chip{background:rgba(255,214,0,.08);border:1px solid rgba(255,214,0,.25);border-radius:8px;padding:6px 12px;font-size:12px;font-family:'DM Mono',monospace;color:var(--gold)}
.camp-chip span{color:var(--muted2);margin-right:4px}
.tabs-wrap{margin-bottom:20px}
.tabs{display:flex;gap:4px;flex-wrap:wrap;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:4px;width:fit-content}
.tab{padding:6px 15px;border-radius:7px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid transparent;background:transparent;color:var(--muted2);transition:all .18s;font-family:'DM Sans',sans-serif}
.tab.on{background:var(--surface3);color:var(--green);border-color:var(--border2)}.tab:hover:not(.on){color:var(--text)}
.games{display:flex;flex-direction:column;gap:6px}
.grow{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;transition:border-color .2s}
.grow:hover{border-color:var(--border2)}.grow.played{border-color:rgba(0,200,83,.18)}.grow.expanded{border-color:var(--border3)}
.gmain{display:grid;grid-template-columns:72px 1fr 90px 1fr 90px;align-items:center;gap:10px;padding:13px 16px;cursor:pointer}
.gnum{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);line-height:1.6}.gdate{font-size:10px;color:var(--muted)}
.team{display:flex;align-items:center;gap:7px;font-size:13px;font-weight:500}.team.r{justify-content:flex-end;flex-direction:row-reverse}
.flag{width:22px;height:15px;object-fit:contain;border-radius:2px;flex-shrink:0}
.score{display:flex;align-items:center;justify-content:center;gap:4px;font-family:'Bebas Neue',sans-serif;font-size:26px;color:var(--green);text-align:center}
.score.tbd{font-family:'DM Mono',monospace;font-size:13px;color:var(--muted2);flex-direction:column;gap:2px}
.score .sep{color:var(--muted);font-size:20px;line-height:1}
.gmeta{display:flex;align-items:center;justify-content:flex-end;gap:8px}
.phase{font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;text-align:right;white-space:nowrap}
.arrow{font-size:11px;color:var(--muted2);transition:transform .2s;flex-shrink:0}.grow.expanded .arrow{transform:rotate(180deg)}
.gpalpites{display:none;padding:14px 16px 16px;border-top:1px solid var(--border);background:var(--surface2)}
.grow.expanded .gpalpites{display:block}
.palpites-label{font-size:10px;color:var(--muted2);font-family:'DM Mono',monospace;letter-spacing:2px;margin-bottom:10px}
.chips{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:7px}
.chip{background:var(--surface3);border:1px solid var(--border);border-radius:8px;padding:8px 10px}
.chip .cn{font-size:10px;color:var(--muted2);font-family:'DM Mono',monospace;margin-bottom:3px}
.chip .cv{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;color:var(--text)}
.chip.hit{border-color:rgba(0,200,83,.4);background:rgba(0,200,83,.07)}.chip.hit .cv{color:var(--green)}
.chip.miss{border-color:rgba(255,68,68,.18)}.chip.miss .cv{color:var(--muted2)}
.chip.exact{border-color:var(--gold);background:rgba(255,214,0,.07)}.chip.exact .cv{color:var(--gold)}
.chip .badge{font-size:8px;font-family:'DM Mono',monospace;font-weight:500;margin-top:3px;letter-spacing:1px}
.chip.exact .badge{color:var(--gold)}.chip.hit .badge{color:var(--green)}
@media(max-width:600px){.gmain{grid-template-columns:60px 1fr 78px 1fr 60px;gap:6px;padding:11px 12px}.team{font-size:11px}.score{font-size:22px}.ranking-grid{grid-template-columns:1fr}.ppts{font-size:34px}}
</style>
</head>

let activeTab='todos';
const expanded=new Set();

function esc(s){return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function flag(t){return FLAGS[t]?`<img class="flag" src="${FLAGS[t]}" alt="${esc(t)}" loading="lazy" onerror="this.style.display='none'">`:''}

function renderRanking(){
  const s=[...DATA.ranking].sort((a,b)=>b.pontos-a.pontos||b.cravadas-a.cravadas);
  const medals=['🥇','🥈','🥉'],pcls=['p1','p2','p3'];
  return`<div class="ranking-wrap"><div class="stitle">Classificação</div><div class="ranking-grid">
  ${s.map((p,i)=>{
    const pc=pcls[i]||(i===s.length-1?'plast':'');
    const med=medals[i]?`<div class="medal">${medals[i]}</div>`:`<div class="medal num">${i+1}º</div>`;
    return`<div class="pcard ${pc}">${med}<div class="pinfo">
      <div class="pname">${esc(p.nome)}${p.nome==='IA'?'<span class="ia-tag">IA</span>':''}</div>
      <div class="pstats">
        <span><b>${p.cravadas}</b>cravadas</span>
        <span><b>${p.corretos}</b>acertos</span>
        <span><b>${p.fase_grupos}</b>grupos</span>
        <span><b>${p.mata_mata}</b>mata-mata</span>
      </div></div>
      <div class="ppts">${p.pontos}<small>pts</small></div></div>`;
  }).join('')}
  </div></div>`;
}

function renderCampeoes(){
  return`<div class="camp-banner">
    <h3>🏆 Palpites de Campeão</h3>
    <div class="camp-chips">
      ${DATA.campeoes.map(c=>`<div class="camp-chip"><span>${esc(c.nome)}:</span>${esc(c.palpite)}</div>`).join('')}
    </div>
  </div>`;
}

function renderJogos(){
  const rodadas=['todos',...new Set(DATA.jogos.map(j=>j.rodada).filter(Boolean))];
  const filtered=activeTab==='todos'?DATA.jogos:DATA.jogos.filter(j=>j.rodada===activeTab);
  return`<div><div class="stitle">Jogos</div>
  <div class="tabs-wrap"><div class="tabs">
    ${rodadas.map(r=>`<button class="tab ${activeTab===r?'on':''}" onclick="setTab('${r}')">${r==='todos'?'Todos':r}</button>`).join('')}
  </div></div>
  <div class="games">${filtered.map(renderGame).join('')}</div></div>`;
}

function renderGame(j){
  const played=j.gols1!=null&&j.gols2!=null;
  // CORREÇÃO: mostra seta para QUALQUER jogo que tenha palpites, independente da rodada
  const hasPal=Array.isArray(j.palpites)&&j.palpites.length>0;
  const isExp=expanded.has(j.num);
  const score=played
    ?`<div class="score">${j.gols1}<span class="sep">×</span>${j.gols2}</div>`
    :`<div class="score tbd"><span>${j.hora}</span></div>`;
  const t1=j.time1==='?'?'A definir':j.time1;
  const t2=j.time2==='?'?'A definir':j.time2;

  let phtml='';
  if(hasPal){
    phtml=`<div class="gpalpites"><div class="palpites-label">PALPITES</div><div class="chips">
    ${j.palpites.map(p=>{
      if(p.g1==null||p.g2==null)return'';
      let cls='',badge='';
      if(played){
        const ex=p.g1===j.gols1&&p.g2===j.gols2;
        const rw=j.gols1>j.gols2?1:j.gols2>j.gols1?2:0;
        const pw=p.g1>p.g2?1:p.g2>p.g1?2:0;
        if(ex){cls='exact';badge='<div class="badge">CRAVOU! 🎯</div>';}
        else if(rw===pw){cls='hit';badge='<div class="badge">ACERTOU ✓</div>';}
        else{cls='miss';}
      }
      return`<div class="chip ${cls}"><div class="cn">${esc(p.nome)}</div><div class="cv">${p.g1}×${p.g2}</div>${badge}</div>`;
    }).filter(Boolean).join('')}
    </div></div>`;
  }

  return`<div class="grow ${played?'played':''} ${isExp?'expanded':''}" id="g${j.num}">
    <div class="gmain" onclick="${hasPal?`toggleGame(${j.num})`:'void(0)'}">
      <div><div class="gnum">#${j.num}</div><div class="gdate">${j.data}</div></div>
      <div class="team">${flag(j.time1)}<span>${esc(t1)}</span></div>
      ${score}
      <div class="team r"><span>${esc(t2)}</span>${flag(j.time2)}</div>
      <div class="gmeta"><div class="phase">${esc(j.rodada)}</div>${hasPal?'<div class="arrow">▼</div>':''}</div>
    </div>${phtml}</div>`;
}

function toggleGame(n){
  expanded.has(n)?expanded.delete(n):expanded.add(n);
  document.getElementById('g'+n)?.classList.toggle('expanded');
}
function setTab(t){activeTab=t;expanded.clear();renderAll();}
function renderAll(){
  document.getElementById('app').innerHTML=renderRanking()+renderCampeoes()+renderJogos();
}

document.getElementById('stampTxt').textContent='Atualizado em '+DATA.ultima_atualizacao;
renderAll();
</script>
