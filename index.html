  if(ref.num){const byNum=DATA.jogos.find(j=>Number(j.num)===Number(ref.num)); if(byNum)return {game:byNum,reversed:false}}
  const a=canonicalTeam(ref.time1), b=canonicalTeam(ref.time2);
  if(a&&b){
    const direct=DATA.jogos.find(j=>norm(j.time1)===norm(a)&&norm(j.time2)===norm(b)); if(direct)return {game:direct,reversed:false};
    const rev=DATA.jogos.find(j=>norm(j.time1)===norm(b)&&norm(j.time2)===norm(a)); if(rev)return {game:rev,reversed:true};
  }
  if(ref.raw){const parsed=extractGameRef(ref.raw); if((parsed.num||parsed.time1)&&parsed!==ref)return findGameByRef(parsed)}
  return {game:null,reversed:false};
}
function addPalpite(map,ref,nome,score){
  const found=findGameByRef(ref); if(!found.game||!nome||!score)return;
  const key=found.game.num || `${norm(found.game.time1)}|${norm(found.game.time2)}`;
  if(!map.has(key))map.set(key,{num:found.game.num,time1:found.game.time1,time2:found.game.time2,palpites:[]});
  const sc=found.reversed?{g1:score.g2,g2:score.g1}:score;
  const row=map.get(key); const existing=row.palpites.find(p=>norm(p.nome)===norm(nome));
  const item={nome,g1:sc.g1,g2:sc.g2,source:'planilha'}; const pts=parsePts(score.pontos??score.pts); if(pts!==null)item.pontos=pts;
  if(existing){Object.assign(existing,item)}else row.palpites.push(item);
}
function pointsColFor(headers, participante, idx){
  const isPts=c=>/ponto|pts|score/i.test(norm(c));
  const pn=norm(participante);
  for(let i=0;i<headers.length;i++){const h=norm(headers[i]); if(i!==idx && h.includes(pn) && isPts(h))return i}
  for(const i of [idx+1,idx-1,idx+2]){if(i>=0&&i<headers.length&&isPts(headers[i]))return i}
  return -1;
}
function scoreWithOptionalPoints(scoreCell, ptsCell){const sc=parseScore(scoreCell); if(!sc)return null; const pts=parsePts(ptsCell); if(pts!==null)sc.pontos=pts; return sc}

function parsePalpitesCSV(csv){
  const rows=parseCSV(csv); if(!rows.length)return [];
  const outMap=new Map(); const participants=DATA.participantes;

  // Formato A: jogos nas linhas e participantes nas colunas.
  for(let hr=0;hr<Math.min(rows.length,40);hr++){
    const h=rows[hr]; const pcols=[];
    participants.forEach(p=>{const idx=h.findIndex(c=>norm(c)===norm(p)||norm(c).includes(norm(p))); if(idx>=0)pcols.push([p,idx,pointsColFor(h,p,idx)])});
    if(pcols.length<3)continue;
    const iNum=headerIndex(h,['jogo','num','nº','n°','#']); const iT1=headerIndex(h,['time 1','mandante','seleção 1','selecao 1','equipe 1','time a']); const iT2=headerIndex(h,['time 2','visitante','seleção 2','selecao 2','equipe 2','time b']);
    for(const r of rows.slice(hr+1)){
      let ref={num:iNum>=0?num(r[iNum]):null,time1:iT1>=0?canonicalTeam(r[iT1]||''):'',time2:iT2>=0?canonicalTeam(r[iT2]||''):'',raw:r.join(' ')};
      if(!findGameByRef(ref).game)ref=extractGameRef(r.join(' '));
      for(const [p,idx,ptIdx] of pcols){const sc=scoreWithOptionalPoints(r[idx],ptIdx>=0?r[ptIdx]:null); if(sc)addPalpite(outMap,ref,p,sc)}
    }
  }

  // Formato B: participante nas linhas e cada coluna é um jogo.
  for(let hr=0;hr<Math.min(rows.length,40);hr++){
    const h=rows[hr]; const gameCols=[];
    h.forEach((cell,idx)=>{const ref=extractGameRef(cell); if(findGameByRef(ref).game)gameCols.push([idx,ref,pointsColFor(h,cell,idx)])});
    if(gameCols.length<3)continue;
    for(const r of rows.slice(hr+1)){
      const p=participantFromRow(r); if(!p)continue;
      for(const [idx,ref,ptIdx] of gameCols){const sc=scoreWithOptionalPoints(r[idx],ptIdx>=0?r[ptIdx]:null); if(sc)addPalpite(outMap,ref,p,sc)}
    }
  }

  // Formato C: cada linha contém participante + jogo + palpite.
  for(let hr=0;hr<Math.min(rows.length,40);hr++){
    const h=rows[hr]; const joined=norm(h.join(' '));
    if(!(joined.includes('participante')||joined.includes('nome')||joined.includes('apostador')))continue;
    if(!(joined.includes('palpite')||joined.includes('aposta')||joined.includes('chute')||joined.includes('placar')))continue;
    const iNome=headerIndex(h,['participante','nome','apostador']); const iPal=headerIndex(h,['palpite','aposta','chute']); const iPts=headerIndex(h,['pontos','pts','score','pontuação','pontuacao']); const iNum=headerIndex(h,['jogo','num','nº','n°','#']); const iT1=headerIndex(h,['time 1','mandante','seleção 1','selecao 1','equipe 1']); const iT2=headerIndex(h,['time 2','visitante','seleção 2','selecao 2','equipe 2']);
    for(const r of rows.slice(hr+1)){
      const p=iNome>=0?(participantFromCell(r[iNome])||participantFromRow(r)):participantFromRow(r); if(!p)continue;
      const ref={num:iNum>=0?num(r[iNum]):null,time1:iT1>=0?canonicalTeam(r[iT1]||''):'',time2:iT2>=0?canonicalTeam(r[iT2]||''):'',raw:r.join(' ')};
      let sc=iPal>=0?scoreWithOptionalPoints(r[iPal],iPts>=0?r[iPts]:null):null; if(!sc){for(const c of r){sc=parseScore(c); if(sc)break}} if(sc&&iPts>=0){const pts=parsePts(r[iPts]); if(pts!==null)sc.pontos=pts}
      if(sc)addPalpite(outMap,ref,p,sc);
    }
  }
  return [...outMap.values()].map(row=>({...row,palpites:DATA.participantes.map(p=>row.palpites.find(x=>norm(x.nome)===norm(p))).filter(Boolean)}));
}
function parseCampeoesCSV(csv){
  const rows=parseCSV(csv); const outMap=new Map(); const participants=DATA.participantes; const teams=allTeams();
  const looksTeam=c=>{const n=norm(c); return teams.some(t=>norm(t)===n) || (String(c||'').trim().length>2 && !/participante|nome|campe[aã]o|palpite|pontos|rodada|resultado/i.test(String(c)) && !parseScore(c) && isNaN(Number(String(c).replace(',','.'))))};
  for(let hr=0;hr<Math.min(rows.length,30);hr++){
    const h=rows[hr]; const pcols=[]; participants.forEach(p=>{const idx=h.findIndex(c=>norm(c)===norm(p)||norm(c).includes(norm(p))); if(idx>=0)pcols.push([p,idx])});
    if(pcols.length>=3){for(const r of rows.slice(hr+1)){if(!/campe|vencedor|ganhador|sele[cç][aã]o/i.test(r.join(' ')))continue; for(const [p,idx] of pcols){const v=(r[idx]||'').trim(); if(looksTeam(v))outMap.set(p,canonicalTeam(v));}}}

      for(const r of rows.slice(hr+1)){const p=iNome>=0?(participantFromCell(r[iNome])||participantFromRow(r)):participantFromRow(r); if(!p)continue; const ref={num:iNum>=0?num(r[iNum]):null,time1:iT1>=0?canonicalTeam(r[iT1]||''):'',time2:iT2>=0?canonicalTeam(r[iT2]||''):'',raw:r.join(' ')}; setPoint(map,ref,p,iPts>=0?r[iPts]:null);}

  const gameGoals=[...games].sort((a,b)=>(b.gols1+b.gols2)-(a.gols1+a.gols2))[0]; const draws=games.filter(j=>j.gols1===j.gols2).length; const cleanSheets=games.filter(j=>j.gols1===0||j.gols2===0).length; const upset=DATA.participantes.map(stats).sort((a,b)=>b.empatesApostados-a.empatesApostados)[0];
  const placares={}; games.forEach(j=>{const k=`${j.gols1}×${j.gols2}`; placares[k]=(placares[k]||0)+1}); const comum=Object.entries(placares).sort((a,b)=>b[1]-a[1])[0];
  return `<section class="section"><div class="stitle">Painel de Estatísticas</div><div class="grid stat-grid"><div class="card stat"><div class="label">Jogos disputados</div><div class="value">${games.length}</div><div class="desc">${pending} pendentes</div></div><div class="card stat"><div class="label">Gols registrados</div><div class="value">${goals}</div><div class="desc">média ${avg} por jogo</div></div><div class="card stat"><div class="label">Líder</div><div class="value">${esc(leader?.nome||'—')}</div><div class="desc">${leader?.pontos||0} pontos</div></div><div class="card stat"><div class="label">Mais cravadas</div><div class="value">${esc(allStats[0]?.nome||'—')}</div><div class="desc">${allStats[0]?.cravadasCalc||0} placares exatos</div></div><div class="card stat"><div class="label">Líder x último</div><div class="value">${(leader?.pontos??0)-(last?.pontos??0)}</div><div class="desc">pontos de diferença</div></div></div><div class="grid curio-grid"><div class="card curio"><div class="label">Jogo mais goleador</div><div class="value">${gameGoals?`${esc(gameGoals.time1)} ${gameGoals.gols1}×${gameGoals.gols2} ${esc(gameGoals.time2)}`:'—'}</div><div class="desc">${gameGoals?(gameGoals.gols1+gameGoals.gols2)+' gols':'Aguardando resultados'}</div></div><div class="card curio"><div class="label">Placar mais comum</div><div class="value">${comum?comum[0]:'—'}</div><div class="desc">apareceu ${comum?comum[1]:0} vez(es)</div></div><div class="card curio"><div class="label">Empates na Copa</div><div class="value">${draws}</div><div class="desc">${games.length?Math.round(draws/games.length*100):0}% dos jogos disputados</div></div><div class="card curio"><div class="label">Empateiro do bolão</div><div class="value">${esc(upset?.nome||'—')}</div><div class="desc">${upset?.empatesApostados||0} palpites de empate</div></div><div class="card curio"><div class="label">Jogos sem sofrer gol</div><div class="value">${cleanSheets}</div><div class="desc">pelo menos uma seleção zerada</div></div></div></section>`}
function renderChampions(){return `<section class="section"><div class="stitle">Palpites de Campeão</div><div class="grid champ-grid">${(DATA.campeoes||[]).map(c=>`<div class="card champ"><span class="who">${esc(c.nome)}</span><div class="pick">${flag(c.palpite)} <b>${esc(c.palpite||'—')}</b></div><span class="label">palpite campeão</span></div>`).join('')}</div></section>`}
function renderParticipantsTable(){const rows=ranking().map(p=>({...p,...stats(p.nome)})); const leader=rows[0]?.pontos||0; return `<section class="section"><div class="stitle">Raio-X dos Participantes</div><div class="table-wrap"><table><thead><tr><th>Pos.</th><th class="name">Participante</th><th>Pontos</th><th>Dif. líder</th><th>Cravadas</th><th>Acertos</th><th>Aproveit.</th><th>Empates apost.</th></tr></thead><tbody>${rows.map(p=>{const diff=leader-p.pontos; return `<tr><td>${p.posicao}º</td><td class="name">${esc(p.nome)}${p.nome==='IA'?' <span class="ia-tag">IA</span>':''}</td><td class="pts">${p.pontos}</td><td>${diff===0?'líder':'-'+diff}</td><td>${p.cravadas||p.cravadasCalc}</td><td>${p.corretos||p.acertosCalc}</td><td>${p.aproveitamento}%</td><td>${p.empatesApostados}</td></tr>`}).join('')}</tbody></table></div></section>`}
function standings(){const out={}; for(const [g,teams] of Object.entries(DATA.grupos||{})){const map=Object.fromEntries(teams.map(t=>[t,{time:t,J:0,V:0,E:0,D:0,GP:0,GC:0,SG:0,Pts:0}])); for(const j of DATA.jogos.filter(played)){if(!map[j.time1]||!map[j.time2])continue; const a=map[j.time1], b=map[j.time2]; a.J++;b.J++;a.GP+=j.gols1;a.GC+=j.gols2;b.GP+=j.gols2;b.GC+=j.gols1; if(j.gols1>j.gols2){a.V++;b.D++;a.Pts+=3} else if(j.gols1<j.gols2){b.V++;a.D++;b.Pts+=3} else {a.E++;b.E++;a.Pts++;b.Pts++} a.SG=a.GP-a.GC;b.SG=b.GP-b.GC;} out[g]=Object.values(map).sort((a,b)=>b.Pts-a.Pts||b.SG-a.SG||b.GP-a.GP||a.time.localeCompare(b.time));} return out}
function renderGroups(){const st=standings(); return `<section class="section"><div class="stitle">Classificação dos Grupos da Copa</div><div class="grid group-grid">${Object.entries(st).map(([g,rows])=>`<div class="card group-card"><h3>Grupo ${g}</h3><div class="table-wrap"><table class="mini"><thead><tr><th class="name">Seleção</th><th>Pts</th><th>J</th><th>V</th><th>E</th><th>D</th><th>SG</th></tr></thead><tbody>${rows.map((r,i)=>`<tr><td class="team-name">${i+1}. ${flag(r.time)} ${esc(r.time)}</td><td class="pts">${r.Pts}</td><td>${r.J}</td><td>${r.V}</td><td>${r.E}</td><td>${r.D}</td><td class="${r.SG>=0?'good':'bad'}">${r.SG>0?'+'+r.SG:r.SG}</td></tr>`).join('')}</tbody></table></div></div>`).join('')}</div></section>`}
function renderArtilharia(){const fallback=DATA.artilhariaFallback||[]; const text=remote.artilhariaTexto; return `<section class="section"><div class="stitle">Artilharia da Copa</div><div class="card card-pad">${text?`<p class="source-note">${esc(text).slice(0,900)}...</p>`:`<div class="table-wrap"><table><thead><tr><th>Rank</th><th class="name">Jogador</th><th>Seleção</th><th>Gols</th></tr></thead><tbody>${fallback.map(a=>`<tr><td>${esc(a.ranking)}</td><td class="name">${esc(a.jogador)}</td><td>${esc(a.selecao)}</td><td class="pts">${a.gols}</td></tr>`).join('')}</tbody></table></div>`}</div></section>`}
function renderNoticias(){
  const fallback=[{titulo:'Uruguai deve ter De La Cruz e Canobbio para enfrentar Cabo Verde; veja mudanças',url:LINKS.ge},{titulo:'Rúben Dias rebate críticas por ida à praia e dá bronca na imprensa portuguesa',url:LINKS.ge},{titulo:'República Tcheca e África do Sul empatam e deixam disputa aberta no Grupo A',url:LINKS.ge},{titulo:'Yamal diz ter Neymar como ídolo, mas elege Messi como melhor da história',url:LINKS.ge},{titulo:'México vence a Coreia do Sul e avança no Grupo A',url:LINKS.ge},{titulo:'Canadá goleia o Catar com atuação dominante',url:LINKS.ge},{titulo:'Suíça assume liderança do Grupo B',url:LINKS.ge},{titulo:'Agenda da Copa: próximos jogos e horários',url:LINKS.ge}];
  const brasilFallback=[{titulo:'Escalação da Seleção: veja provável Brasil para enfrentar o Haiti',url:'https://ge.globo.com/futebol/copa-do-mundo/noticia/2026/06/18/escalacao-da-selecao-danilo-e-matheus-cunha-sao-novidades-mas-ancelotti-faz-misterio.ghtml'},{titulo:'Brasil x Haiti: pendurados e regra dos cartões',url:'https://ge.globo.com/futebol/selecao-brasileira/'},{titulo:'Ancelotti faz mistério sobre titulares da Seleção',url:'https://ge.globo.com/futebol/selecao-brasileira/'},{titulo:'Neymar e bastidores da Seleção na Copa',url:'https://ge.globo.com/futebol/selecao-brasileira/'}];
  const news=(remote.noticias&&remote.noticias.length?remote.noticias:fallback).slice(0,8); const br=(remote.noticiasBrasil&&remote.noticiasBrasil.length?remote.noticiasBrasil:brasilFallback).slice(0,4);
  const card=n=>`<a class="card news-card" href="${esc(n.url||LINKS.ge)}" target="_blank" rel="noopener"><div class="tag">ge · Copa do Mundo</div><h3>${esc(n.titulo||n.title||'Notícia da Copa')}</h3><div class="meta">Abrir matéria ↗</div></a>`;
  return `<section class="section"><div class="stitle">Notícias da Copa</div><div class="grid news-grid more">${news.map(card).join('')}</div><div class="stitle news-split">Brasil na Copa</div><div class="grid news-grid more">${br.map(card).join('')}</div></section>`
}

function isStandalone(){return window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone===true}
function isIOS(){return /iphone|ipad|ipod/i.test(navigator.userAgent)}
function installApp(){
  const ios=document.getElementById('ios-help');
  if(deferredInstallPrompt){
    deferredInstallPrompt.prompt();
    deferredInstallPrompt.userChoice.finally(()=>{deferredInstallPrompt=null; render()});
  } else if(isIOS()){
    ios?.classList.toggle('on');
  } else {
    navigator.clipboard?.writeText(location.href).then(()=>{const el=document.getElementById('copy-ok'); if(el){el.classList.add('on'); setTimeout(()=>el.classList.remove('on'),2200)}});
  }
}
function shareApp(){
  const data={title:'Bolão Copa do Mundo NEXA 2026',text:'Acompanha o bolão da NEXA aqui:',url:location.href};
  if(navigator.share) navigator.share(data).catch(()=>{}); else navigator.clipboard?.writeText(location.href).then(()=>{const el=document.getElementById('copy-ok'); if(el){el.classList.add('on'); setTimeout(()=>el.classList.remove('on'),2200)}});
}
function renderInstallWidget(){
  const installed=isStandalone();
  return `<section class="section"><div class="card install-card"><div><h2>📲 Leve o bolão pro celular</h2><p>${installed?'Você já está abrindo como app.':'Instale o bolão na tela inicial e abra igual app, sem precisar ficar procurando o link.'}</p><div class="install-steps"><span class="step-pill">Android: tocar em Instalar</span><span class="step-pill">iPhone: Compartilhar → Adicionar à Tela de Início</span></div><div id="ios-help" class="ios-help">No iPhone: toque no botão de compartilhar do Safari e depois em <b>Adicionar à Tela de Início</b>.</div><div id="copy-ok" class="copy-ok">Link copiado ✓</div></div><div class="install-actions"><button class="app-btn" onclick="installApp()">Instalar como app</button><button class="app-btn secondary" onclick="shareApp()">Compartilhar link</button></div></div></section>`
}
function renderLinks(){return `<section class="section"><div class="grid quick-links"><a class="card quick-link" href="${LINKS.sheet}" target="_blank" rel="noopener"><div><b>Planilha oficial do bolão</b><small>Abra os dados completos no Google Sheets</small></div><span>📊</span></a><a class="card quick-link" href="${LINKS.caze}" target="_blank" rel="noopener"><div><b>Assistir jogos ao vivo</b><small>Canal da CazéTV no YouTube</small></div><span>▶️</span></a></div></section>`}
function renderPerformance(){
  const dia=DATA.desempenhoDia||computedPerformance('dia'); const rodada=DATA.desempenhoRodada||computedPerformance('rodada');
  const table=(title,rows)=>{const limited=(rows||[]).slice(-10); return `<div class="card perf-card"><h3>${title}</h3><div class="table-wrap"><table class="perf-table"><thead><tr><th class="name">Período</th>${DATA.participantes.map(p=>`<th>${esc(p)}</th>`).join('')}</tr></thead><tbody>${limited.map(r=>{const max=Math.max(...DATA.participantes.map(p=>Number(r.pts?.[p]??0))); return `<tr><td class="name">${esc(r.label)}</td>${DATA.participantes.map(p=>{const v=Number(r.pts?.[p]??0); return `<td class="${v===max&&max>0?'best-day':''}">${v||'—'}</td>`}).join('')}</tr>`}).join('')}</tbody></table></div></div>`};
  return `<section class="section"><div class="stitle">Desempenho por Dia e Rodada</div><div class="grid performance-grid">${table('Por dia',dia)}${table('Por rodada',rodada)}</div></section>`
}
function roundButtons(){return ['todos',...new Set(DATA.jogos.map(j=>j.rodada).filter(Boolean))]}
function filteredGames(){return DATA.jogos.filter(j=>(activeRound==='todos'||j.rodada===activeRound)&&(activeStatus==='todos'||(activeStatus==='disputados'?played(j):!played(j)))&&(!searchTerm||norm(`${j.time1} ${j.time2} ${j.rodada}`).includes(norm(searchTerm))))}
function renderGames(){return `<section class="section"><div class="stitle">Jogos e Palpites</div><div class="controls"><div class="tabs">${roundButtons().map(r=>`<button class="${activeRound===r?'on':''}" onclick="activeRound='${esc(r)}';render()">${r==='todos'?'Todos':esc(r)}</button>`).join('')}</div><div class="tabs"><button class="${activeStatus==='todos'?'on':''}" onclick="activeStatus='todos';render()">Todos</button><button class="${activeStatus==='disputados'?'on':''}" onclick="activeStatus='disputados';render()">Disputados</button><button class="${activeStatus==='pendentes'?'on':''}" onclick="activeStatus='pendentes';render()">Pendentes</button></div><input class="search" placeholder="Buscar seleção..." value="${esc(searchTerm)}" oninput="searchTerm=this.value;render()"></div><div class="games">${filteredGames().map(renderGame).join('')||'<div class="empty">Nenhum jogo encontrado.</div>'}</div></section>`}
function renderGame(j){const open=expanded.has(j.num), hasPal=(j.palpites||[]).length>0; return `<article class="game ${played(j)?'played':''} ${open?'open':''}"><div class="game-main" onclick="toggleGame(${j.num})"><div class="gnum">#${j.num}<br>${esc(j.data||'')}</div><div class="team">${flag(j.time1)} ${esc(j.time1==='?'?'A definir':j.time1)}</div><div class="score">${played(j)?`${j.gols1}<span style="color:var(--muted)">×</span>${j.gols2}`:`<small>${esc(j.hora||'a definir')}</small>`}</div><div class="team r">${flag(j.time2)} ${esc(j.time2==='?'?'A definir':j.time2)}</div><div class="arrow">${hasPal?'⌄':'—'}</div></div><div class="palps">${hasPal?`<div class="chips">${j.palpites.map(p=>{const kind=palpiteKind(j,p); const label=kind==='exact'?'cravada':kind==='hit'?'acertou resultado':''; const sc=scorePalpite(j,p); return `<div class="chip ${kind==='exact'?'exact':kind==='hit'?'hit':''}"><div class="n">${esc(p.nome)}</div><div class="v">${p.g1}×${p.g2}</div>${played(j)?`<div class="palp-points ${sc.oficial?'official':''} ${(sc.valor??0)===0?'zero':''}">${scoreText(sc)}</div><div class="point-note">${sc.oficial?'oficial':'prévia'}</div>`:''}${played(j)&&label?`<div class="result-badge ${kind}">${label}</div>`:''}</div>`}).join('')}</div>`:`<div class="empty">${esc(j.palpitesStatus||'Palpites ainda não carregados para este jogo.')}</div>`}</div></article>`}
function toggleGame(n){expanded.has(n)?expanded.delete(n):expanded.add(n); render()}
function render(){document.getElementById('app').innerHTML=renderLinks()+renderInstallWidget()+renderLastGame()+renderRanking()+renderStats()+renderPerformance()+renderChampions()+renderParticipantsTable()+renderGroups()+renderArtilharia()+renderNoticias()+renderGames()+`<div class="footer">Feito por Yruam Käffer + ChatGPT Plus para alegria da rapaziada &lt;3</div>`}

window.addEventListener('beforeinstallprompt', e=>{e.preventDefault(); deferredInstallPrompt=e; render()});
window.addEventListener('appinstalled', ()=>{deferredInstallPrompt=null; render()});
if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('/service-worker.js').catch(()=>{}))}
loadRemote();
</script>
