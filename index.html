  for(let hr=0;hr<Math.min(rows.length,40);hr++){
    const h=rows[hr]; const pcols=[];
    participants.forEach(p=>{const idx=h.findIndex(c=>norm(c)===norm(p)||norm(c).includes(norm(p))); if(idx>=0)pcols.push([p,idx])});
    if(pcols.length<3)continue;
    const iNum=headerIndex(h,['jogo','num','nº','n°','#']); const iT1=headerIndex(h,['time 1','mandante','seleção 1','selecao 1','equipe 1','time a']); const iT2=headerIndex(h,['time 2','visitante','seleção 2','selecao 2','equipe 2','time b']);
    for(const r of rows.slice(hr+1)){
      let ref={num:iNum>=0?num(r[iNum]):null,time1:iT1>=0?canonicalTeam(r[iT1]||''):'',time2:iT2>=0?canonicalTeam(r[iT2]||''):'',raw:r.join(' ')};
      if(!findGameByRef(ref).game)ref=extractGameRef(r.join(' '));
      for(const [p,idx] of pcols){const sc=parseScore(r[idx]); if(sc)addPalpite(outMap,ref,p,sc)}
    }
  }

  // Formato B: participante nas linhas e cada coluna é um jogo.
  for(let hr=0;hr<Math.min(rows.length,40);hr++){
    const h=rows[hr]; const gameCols=[];
    h.forEach((cell,idx)=>{const ref=extractGameRef(cell); if(findGameByRef(ref).game)gameCols.push([idx,ref])});
    if(gameCols.length<3)continue;
    for(const r of rows.slice(hr+1)){
      const p=participantFromRow(r); if(!p)continue;
      for(const [idx,ref] of gameCols){const sc=parseScore(r[idx]); if(sc)addPalpite(outMap,ref,p,sc)}
    }
  }

  // Formato C: cada linha contém participante + jogo + palpite.
  for(let hr=0;hr<Math.min(rows.length,40);hr++){
    const h=rows[hr]; const joined=norm(h.join(' '));
    if(!(joined.includes('participante')||joined.includes('nome')||joined.includes('apostador')))continue;
    if(!(joined.includes('palpite')||joined.includes('aposta')||joined.includes('chute')||joined.includes('placar')))continue;
    const iNome=headerIndex(h,['participante','nome','apostador']); const iPal=headerIndex(h,['palpite','aposta','chute']); const iNum=headerIndex(h,['jogo','num','nº','n°','#']); const iT1=headerIndex(h,['time 1','mandante','seleção 1','selecao 1','equipe 1']); const iT2=headerIndex(h,['time 2','visitante','seleção 2','selecao 2','equipe 2']);
    for(const r of rows.slice(hr+1)){
      const p=iNome>=0?(participantFromCell(r[iNome])||participantFromRow(r)):participantFromRow(r); if(!p)continue;
      const ref={num:iNum>=0?num(r[iNum]):null,time1:iT1>=0?canonicalTeam(r[iT1]||''):'',time2:iT2>=0?canonicalTeam(r[iT2]||''):'',raw:r.join(' ')};
      let sc=iPal>=0?parseScore(r[iPal]):null; if(!sc){for(const c of r){sc=parseScore(c); if(sc)break}}
      if(sc)addPalpite(outMap,ref,p,sc);
    }
  }
  return [...outMap.values()].map(row=>({...row,palpites:DATA.participantes.map(p=>row.palpites.find(x=>norm(x.nome)===norm(p))).filter(Boolean)}));
}
function parseCampeoesCSV(csv){
  const rows=parseCSV(csv); const outMap=new Map(); const participants=DATA.participantes; const teams=allTeams();
  const looksTeam=c=>{const n=norm(c); return teams.some(t=>norm(t)===n) || (String(c||'').trim().length>2 && !/participante|nome|campe[aã]o|palpite|pontos|rodada|resultado/i.test(String(c)) && !parseScore(c) && isNaN(Number(String(c).replace(',','.'))))};
  for(let hr=0;hr<Math.min(rows.length,30);hr++){
    const h=rows[hr]; const pcols=[]; participants.forEach(p=>{const idx=h.findIndex(c=>norm(c)===norm(p)||norm(c).includes(norm(p))); if(idx>=0)pcols.push([p,idx])});
    if(pcols.length>=3){for(const r of rows.slice(hr+1)){if(!/campe|vencedor|ganhador|sele[cç][aã]o/i.test(r.join(' ')))continue; for(const [p,idx] of pcols){const v=(r[idx]||'').trim(); if(looksTeam(v))outMap.set(p,canonicalTeam(v));}}}
  }
  for(const r of rows){const nome=participantFromRow(r); if(!nome)continue; const cand=r.find(c=>norm(c)!==norm(nome)&&looksTeam(c)); if(cand)outMap.set(nome,canonicalTeam(cand));}
  return participants.filter(p=>outMap.has(p)).map(nome=>({nome,palpite:outMap.get(nome)}));
}
function mergeRemote(payload){
  if(!payload||!payload.csvs)return;
  const csvs=payload.csvs;
  if(csvs.ranking){const r=parseRankingCSV(csvs.ranking); if(r.length>=3)DATA.rankingOficial=r}
  if(csvs.jogos){const jogos=parseJogosCSV(csvs.jogos); for(const novo of jogos){const found=findGameByRef(novo); const old=found.game; if(old)Object.assign(old,{data:novo.data||old.data,hora:novo.hora||old.hora,time1:novo.time1||old.time1,time2:novo.time2||old.time2,gols1:novo.gols1,gols2:novo.gols2,rodada:novo.rodada||old.rodada})}}
  if(csvs.palpites){const palps=parsePalpitesCSV(csvs.palpites); for(const row of palps){const found=findGameByRef(row); const j=found.game; if(j&&row.palpites.length){j.palpites=row.palpites; j.palpitesFonte='planilha'; delete j.palpitesStatus}}}
  if(csvs.campeoes){const c=parseCampeoesCSV(csvs.campeoes); if(c.length>=3)DATA.campeoes=c}
  remote={ok:payload.ok!==false,source:payload.source||'api',updatedAt:payload.updatedAt||new Date().toISOString(),warnings:payload.warnings||[],artilhariaTexto:payload.artilhariaTexto||null,noticias:payload.noticias||[]};
}
async function loadRemote(){
  try{const r=await fetch('/api/bolao?ts='+Date.now(),{cache:'no-store'}); if(!r.ok)throw new Error('API local indisponível'); mergeRemote(await r.json());}
  catch(e){
    try{const r=await fetch(CSV_URLS.ranking+'&ts='+Date.now(),{cache:'no-store'}); const text=await r.text(); const rg=parseRankingCSV(text); if(rg.length>=3){DATA.rankingOficial=rg; remote={ok:true,source:'csv-direto',updatedAt:new Date().toISOString(),warnings:[],artilhariaTexto:null,noticias:[]}}}
    catch(err){remote={ok:false,source:'fallback',updatedAt:null,warnings:[],artilhariaTexto:null,noticias:[]}}
  }
  const s=document.getElementById('syncStatus'); if(s)s.textContent=remote.ok?'online':'snapshot';
  render();
}
function ranking(){return [...(DATA.rankingOficial||[])].sort((a,b)=>b.pontos-a.pontos||b.cravadas-a.cravadas).map((p,i)=>({...p,posicao:i+1}))}
function stats(nome){const games=DATA.jogos.filter(j=>played(j)&&getPalpite(j,nome)); let pts=0,cr=0,ac=0,emp=0,ptsEmp=0; for(const j of games){const p=getPalpite(j,nome), sc=scorePalpite(j,p); pts+=sc; if(sc===10)cr++; if(sc>0)ac++; if(p&&p.g1===p.g2)emp++; if(j.gols1===j.gols2)ptsEmp+=sc;} return {nome,jogos:games.length,pontosCalc:pts,cravadasCalc:cr,acertosCalc:ac,empatesApostados:emp,ptsEmpate:ptsEmp,aproveitamento:games.length?Math.round(ac/games.length*100):0}}

let rankMoveCache=null, rankSnapshotQueued=false;
function getRankMoves(rows){
  if(rankMoveCache)return rankMoveCache;
  const moves={}; let stored={positions:{}};
  try{stored=JSON.parse(localStorage.getItem('bolao-ranking-snapshot')||'{"positions":{}}')}catch(e){}
  for(const p of rows){
    let previous=Number(p.posicaoAnterior||0);
    if(!previous && p.movimentoRaw){const m=String(p.movimentoRaw).match(/-?\d+/); if(m)previous=p.posicao+Number(m[0])*-1}
    if(!previous)previous=Number(stored.positions?.[norm(p.nome)]||0);
    moves[p.nome]=previous?previous-p.posicao:0;
  }
  rankMoveCache=moves;
  if(!rankSnapshotQueued){rankSnapshotQueued=true; setTimeout(()=>{try{localStorage.setItem('bolao-ranking-snapshot',JSON.stringify({updatedAt:new Date().toISOString(),positions:Object.fromEntries(rows.map(p=>[norm(p.nome),p.posicao]))}))}catch(e){}},1200)}
  return moves;
}
function moveBadge(v){if(v>0)return `<span class="move up" title="Subiu ${v} posição${v>1?'ões':''}">↑${v}</span>`; if(v<0)return `<span class="move down" title="Desceu ${Math.abs(v)} posição${Math.abs(v)>1?'ões':''}">↓${Math.abs(v)}</span>`; return `<span class="move flat" title="Sem variação">•</span>`}
function renderRanking(){
  const s=ranking(); const leader=s[0]?.pontos??0; const moves=getRankMoves(s); const medals=['🥇','🥈','🥉']; const tags=['LÍDER','PÓDIO','PÓDIO'];
  return `<section class="section"><div class="stitle">Classificação do Bolão</div><div class="grid ranking-grid">${s.map((p,i)=>{const st=stats(p.nome); const diff=leader-p.pontos; const isLast=i===s.length-1; return `<article class="card rank-card ${i<3?'p'+(i+1):''} ${isLast?'last':''}">${i<3?`<div class="podium-tag">${tags[i]}</div>`:''}<div class="medal ${i>2?'num':''}">${medals[i]||((i+1)+'º')}</div><div class="pinfo"><div class="pname">${esc(p.nome)}${p.nome==='IA'?'<span class="ia-tag">IA</span>':''}${moveBadge(moves[p.nome]||0)}</div><div class="pstats"><span><b>${p.cravadas||st.cravadasCalc}</b> cravadas</span><span><b>${p.corretos||st.acertosCalc}</b> acertos</span><span><b>${diff===0?'líder':'-'+diff}</b> do líder</span></div></div><div class="ppts">${p.pontos}<small>pts</small></div></article>`}).join('')}</div></section>`
}
function renderStats(){const games=DATA.jogos.filter(played), goals=games.reduce((s,j)=>s+j.gols1+j.gols2,0), pending=DATA.jogos.filter(j=>!played(j)).length; const rs=ranking(), leader=rs[0], last=rs.at(-1); const avg=games.length?(goals/games.length).toFixed(2):'0.00'; const allStats=DATA.participantes.map(stats).sort((a,b)=>b.cravadasCalc-a.cravadasCalc||b.acertosCalc-a.acertosCalc); return `<section class="section"><div class="stitle">Painel de Estatísticas</div><div class="grid stat-grid"><div class="card stat"><div class="label">Jogos disputados</div><div class="value">${games.length}</div><div class="desc">${pending} pendentes</div></div><div class="card stat"><div class="label">Gols registrados</div><div class="value">${goals}</div><div class="desc">média ${avg} por jogo</div></div><div class="card stat"><div class="label">Líder</div><div class="value">${esc(leader?.nome||'—')}</div><div class="desc">${leader?.pontos||0} pontos</div></div><div class="card stat"><div class="label">Mais cravadas</div><div class="value">${esc(allStats[0]?.nome||'—')}</div><div class="desc">${allStats[0]?.cravadasCalc||0} placares exatos</div></div><div class="card stat"><div class="label">Líder x último</div><div class="value">${(leader?.pontos??0)-(last?.pontos??0)}</div><div class="desc">pontos de diferença</div></div></div></section>`}
function renderChampions(){return `<section class="section"><div class="stitle">Palpites de Campeão</div><div class="grid champ-grid">${(DATA.campeoes||[]).map(c=>`<div class="card champ"><span class="who">${esc(c.nome)}</span><div class="pick">${flag(c.palpite)} <b>${esc(c.palpite||'—')}</b></div><span class="label">palpite campeão</span></div>`).join('')}</div></section>`}
function renderParticipantsTable(){const rows=ranking().map(p=>({...p,...stats(p.nome)})); const leader=rows[0]?.pontos||0; return `<section class="section"><div class="stitle">Raio-X dos Participantes</div><div class="table-wrap"><table><thead><tr><th>Pos.</th><th class="name">Participante</th><th>Pontos</th><th>Dif. líder</th><th>Cravadas</th><th>Acertos</th><th>Aproveit.</th><th>Empates apost.</th></tr></thead><tbody>${rows.map(p=>{const diff=leader-p.pontos; return `<tr><td>${p.posicao}º</td><td class="name">${esc(p.nome)}${p.nome==='IA'?' <span class="ia-tag">IA</span>':''}</td><td class="pts">${p.pontos}</td><td>${diff===0?'líder':'-'+diff}</td><td>${p.cravadas||p.cravadasCalc}</td><td>${p.corretos||p.acertosCalc}</td><td>${p.aproveitamento}%</td><td>${p.empatesApostados}</td></tr>`}).join('')}</tbody></table></div></section>`}
function standings(){const out={}; for(const [g,teams] of Object.entries(DATA.grupos||{})){const map=Object.fromEntries(teams.map(t=>[t,{time:t,J:0,V:0,E:0,D:0,GP:0,GC:0,SG:0,Pts:0}])); for(const j of DATA.jogos.filter(played)){if(!map[j.time1]||!map[j.time2])continue; const a=map[j.time1], b=map[j.time2]; a.J++;b.J++;a.GP+=j.gols1;a.GC+=j.gols2;b.GP+=j.gols2;b.GC+=j.gols1; if(j.gols1>j.gols2){a.V++;b.D++;a.Pts+=3} else if(j.gols1<j.gols2){b.V++;a.D++;b.Pts+=3} else {a.E++;b.E++;a.Pts++;b.Pts++} a.SG=a.GP-a.GC;b.SG=b.GP-b.GC;} out[g]=Object.values(map).sort((a,b)=>b.Pts-a.Pts||b.SG-a.SG||b.GP-a.GP||a.time.localeCompare(b.time));} return out}
function renderGroups(){const st=standings(); return `<section class="section"><div class="stitle">Classificação dos Grupos da Copa</div><div class="grid group-grid">${Object.entries(st).map(([g,rows])=>`<div class="card group-card"><h3>Grupo ${g}</h3><div class="table-wrap"><table class="mini"><thead><tr><th class="name">Seleção</th><th>Pts</th><th>J</th><th>V</th><th>E</th><th>D</th><th>SG</th></tr></thead><tbody>${rows.map((r,i)=>`<tr><td class="team-name">${i+1}. ${flag(r.time)} ${esc(r.time)}</td><td class="pts">${r.Pts}</td><td>${r.J}</td><td>${r.V}</td><td>${r.E}</td><td>${r.D}</td><td class="${r.SG>=0?'good':'bad'}">${r.SG>0?'+'+r.SG:r.SG}</td></tr>`).join('')}</tbody></table></div></div>`).join('')}</div></section>`}
function renderArtilharia(){const fallback=DATA.artilhariaFallback||[]; const text=remote.artilhariaTexto; return `<section class="section"><div class="stitle">Artilharia da Copa</div><div class="card card-pad">${text?`<p class="source-note">${esc(text).slice(0,900)}...</p>`:`<div class="table-wrap"><table><thead><tr><th>Rank</th><th class="name">Jogador</th><th>Seleção</th><th>Gols</th></tr></thead><tbody>${fallback.map(a=>`<tr><td>${esc(a.ranking)}</td><td class="name">${esc(a.jogador)}</td><td>${esc(a.selecao)}</td><td class="pts">${a.gols}</td></tr>`).join('')}</tbody></table></div>`}</div></section>`}
function renderNoticias(){const fallback=[{titulo:'Uruguai deve ter De La Cruz e Canobbio para enfrentar Cabo Verde; veja mudanças',url:'https://ge.globo.com/futebol/copa-do-mundo/'},{titulo:'Rúben Dias rebate críticas por ida à praia e dá bronca na imprensa portuguesa',url:'https://ge.globo.com/futebol/copa-do-mundo/'},{titulo:'República Tcheca e África do Sul empatam e deixam disputa aberta no Grupo A',url:'https://ge.globo.com/futebol/copa-do-mundo/'},{titulo:'Yamal diz ter Neymar como ídolo, mas elege Messi como melhor da história',url:'https://ge.globo.com/futebol/copa-do-mundo/'}]; const news=(remote.noticias&&remote.noticias.length?remote.noticias:fallback).slice(0,6); return `<section class="section"><div class="stitle">Notícias da Copa</div><div class="grid news-grid">${news.map(n=>`<a class="card news-card" href="${esc(n.url||'https://ge.globo.com/futebol/copa-do-mundo/')}" target="_blank" rel="noopener"><div class="tag">ge · Copa do Mundo</div><h3>${esc(n.titulo||n.title||'Notícia da Copa')}</h3><div class="meta">Abrir matéria ↗</div></a>`).join('')}</div></section>`}
function roundButtons(){return ['todos',...new Set(DATA.jogos.map(j=>j.rodada).filter(Boolean))]}
function filteredGames(){return DATA.jogos.filter(j=>(activeRound==='todos'||j.rodada===activeRound)&&(activeStatus==='todos'||(activeStatus==='disputados'?played(j):!played(j)))&&(!searchTerm||norm(`${j.time1} ${j.time2} ${j.rodada}`).includes(norm(searchTerm))))}
function renderGames(){return `<section class="section"><div class="stitle">Jogos e Palpites</div><div class="controls"><div class="tabs">${roundButtons().map(r=>`<button class="${activeRound===r?'on':''}" onclick="activeRound='${esc(r)}';render()">${r==='todos'?'Todos':esc(r)}</button>`).join('')}</div><div class="tabs"><button class="${activeStatus==='todos'?'on':''}" onclick="activeStatus='todos';render()">Todos</button><button class="${activeStatus==='disputados'?'on':''}" onclick="activeStatus='disputados';render()">Disputados</button><button class="${activeStatus==='pendentes'?'on':''}" onclick="activeStatus='pendentes';render()">Pendentes</button></div><input class="search" placeholder="Buscar seleção..." value="${esc(searchTerm)}" oninput="searchTerm=this.value;render()"></div><div class="games">${filteredGames().map(renderGame).join('')||'<div class="empty">Nenhum jogo encontrado.</div>'}</div></section>`}
function renderGame(j){const open=expanded.has(j.num), hasPal=(j.palpites||[]).length>0; return `<article class="game ${played(j)?'played':''} ${open?'open':''}"><div class="game-main" onclick="toggleGame(${j.num})"><div class="gnum">#${j.num}<br>${esc(j.data||'')}</div><div class="team">${flag(j.time1)} ${esc(j.time1==='?'?'A definir':j.time1)}</div><div class="score">${played(j)?`${j.gols1}<span style="color:var(--muted)">×</span>${j.gols2}`:`<small>${esc(j.hora||'a definir')}</small>`}</div><div class="team r">${flag(j.time2)} ${esc(j.time2==='?'?'A definir':j.time2)}</div><div class="arrow">${hasPal?'⌄':'—'}</div></div><div class="palps">${hasPal?`<div class="chips">${j.palpites.map(p=>{const sc=scorePalpite(j,p); return `<div class="chip ${sc===10?'exact':sc>0?'hit':''}"><div class="n">${esc(p.nome)}</div><div class="v">${p.g1}×${p.g2}</div>${played(j)&&sc>0?`<div class="n">+${sc} pts</div>`:''}</div>`}).join('')}</div>`:`<div class="empty">${esc(j.palpitesStatus||'Palpites ainda não carregados para este jogo.')}</div>`}</div></article>`}
function toggleGame(n){expanded.has(n)?expanded.delete(n):expanded.add(n); render()}
function render(){document.getElementById('app').innerHTML=renderRanking()+renderStats()+renderChampions()+renderParticipantsTable()+renderGroups()+renderArtilharia()+renderNoticias()+renderGames()+`<div class="footer">Feito por Yruam Käffer + ChatGPT Plus para alegria da rapaziada &lt;3</div>`}
loadRemote();
</script>
