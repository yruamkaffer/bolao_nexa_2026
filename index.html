<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Bolão Copa 2026</title>
  <style>
    :root{--bg:#061424;--panel:#0c2138;--panel2:#0b1c31;--line:#24425e;--txt:#f2f7ff;--muted:#91a7bd;--cyan:#9bdcff;--gold:#ffd66b;--orange:#ff8b4a;--green:#8ef2b0;--red:#ff8e8e}
    *{box-sizing:border-box} html{scroll-behavior:smooth} body{margin:0;background:radial-gradient(circle at 20% 0,#102b48 0,#071726 28%,#061424 70%);color:var(--txt);font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono","Courier New",monospace;min-height:100dvh;overflow-x:hidden}
    body:before{content:"";position:fixed;inset:0;background-image:linear-gradient(rgba(155,220,255,.055) 1px,transparent 1px),linear-gradient(90deg,rgba(155,220,255,.055) 1px,transparent 1px);background-size:82px 82px;pointer-events:none}
    .wrap{width:min(1100px,100%);margin:auto;padding:22px 16px 72px;position:relative}.top{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:18px}.brand{font-family:Impact,"Arial Black",sans-serif;letter-spacing:.13em;font-size:clamp(26px,6vw,56px);line-height:.95;text-transform:uppercase}.pill{border:1px solid var(--line);border-radius:999px;padding:9px 13px;color:var(--muted);background:rgba(12,33,56,.72);font-size:12px;white-space:nowrap}.tabs{display:flex;gap:8px;overflow:auto;padding:6px 0 14px}.tab{border:1px solid var(--line);background:#071b2f;color:var(--muted);padding:10px 13px;border-radius:999px;text-decoration:none;font-weight:700;white-space:nowrap}.tab:hover,.tab.on{color:#061424;background:var(--cyan);border-color:var(--cyan)}
    h2{margin:42px 0 20px;font-family:Impact,"Arial Black",sans-serif;letter-spacing:.18em;text-transform:uppercase;font-size:clamp(26px,5vw,44px);font-weight:900;color:#d9f2ff;display:flex;align-items:center;gap:16px}h2:after{content:"";height:2px;background:var(--line);flex:1}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px}@media(max-width:720px){.grid{grid-template-columns:1fr}.wrap{padding-inline:14px}.top{align-items:flex-start;flex-direction:column}}
    .card{border:1px solid var(--line);background:linear-gradient(135deg,rgba(20,48,78,.92),rgba(8,24,42,.94));border-radius:22px;padding:18px;box-shadow:0 22px 50px rgba(0,0,0,.25);position:relative;overflow:hidden}.card:before{content:"";position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.035),transparent);transform:translateX(-100%);animation:shine 6s infinite}@keyframes shine{60%,100%{transform:translateX(110%)}}.hero{border-color:rgba(255,139,74,.62);padding:26px 22px}.round{color:#ffb381;letter-spacing:.18em;text-transform:uppercase;font-weight:900;font-size:14px}.scoreline{display:flex;align-items:center;gap:12px;flex-wrap:wrap;font-family:Arial,Helvetica,sans-serif;font-weight:900;font-size:clamp(28px,7vw,54px);margin:14px 0}.score{color:var(--orange);font-size:1.15em}.meta{display:flex;gap:18px;flex-wrap:wrap;color:var(--muted);font-size:18px}.btn{display:block;margin-top:24px;text-align:center;border:1px solid var(--line);border-radius:999px;padding:14px;color:#bfeaff;text-decoration:none;background:rgba(6,20,36,.45)}
    .bet{min-height:102px;display:flex;justify-content:space-between;gap:12px;align-items:center}.name{font-size:18px}.guess{color:var(--muted);font-size:14px;margin-top:4px}.pts{font-size:28px;color:var(--cyan);font-weight:900}.status{font-size:12px;letter-spacing:.12em;color:var(--muted);text-transform:uppercase}.ok{color:var(--green)}.warn{color:var(--gold)}.bad{color:var(--red)}
    .rank{display:grid;gap:14px}.rankrow{display:grid;grid-template-columns:auto 1fr auto;gap:14px;align-items:center}.pos{width:48px;height:48px;border-radius:16px;display:grid;place-items:center;background:rgba(155,220,255,.12);border:1px solid var(--line);font-weight:900;font-size:20px}.rankrow:first-child .pos{background:linear-gradient(135deg,#ffed9d,#e19b2f);color:#061424}.rankname{font-family:Arial,Helvetica,sans-serif;font-weight:900;font-size:25px}.rankmeta{color:var(--muted);margin-top:5px}.rankpts{font-family:Impact,"Arial Black",sans-serif;font-size:42px;color:var(--cyan);line-height:.9;text-align:right}.small{font-size:13px;color:var(--muted)}
    .games{display:grid;gap:12px}.game{display:grid;grid-template-columns:74px 1fr 70px 1fr 35px;align-items:center;gap:10px;padding:16px;border:1px solid var(--line);border-radius:22px;background:rgba(12,33,56,.70)}.gid{color:var(--muted)}.team{font-family:Arial,Helvetica,sans-serif;font-weight:800}.time{text-align:center;color:var(--muted)}@media(max-width:600px){.game{grid-template-columns:74px 1fr 48px 1fr 22px;padding:14px 12px}.team{font-size:14px}.time{font-size:14px}}
    .debug{white-space:pre-wrap;background:#03101d;border:1px solid var(--line);border-radius:16px;padding:12px;color:#9bb2c8;font-size:12px;max-height:280px;overflow:auto}.footer{text-align:center;color:var(--muted);padding:34px 0 10px;border-top:1px solid var(--line);margin-top:48px}.loading{opacity:.75}.hide{display:none!important}
  </style>
</head>
<body>
  <main class="wrap">
    <div class="top"><div class="brand">Bolão Copa 2026</div><div id="sync" class="pill">carregando CSV…</div></div>
    <nav class="tabs"><a class="tab on" href="#ultimo">Último jogo</a><a class="tab" href="#rank">Classificação</a><a class="tab" href="#jogos">Jogos</a><a class="tab" href="#debug">Diagnóstico</a></nav>

    <section id="ultimo"><h2>Último jogo atualizado do bolão</h2><div id="lastGame" class="card hero loading">Carregando dados da planilha…</div><div id="lastBets" class="grid" style="margin-top:18px"></div></section>
    <section id="rank"><h2>Classificação do bolão</h2><div id="ranking" class="rank"></div></section>
    <section id="jogos"><h2>Próximos jogos</h2><div id="games" class="games"></div></section>
    <section id="debug"><h2>Diagnóstico</h2><div id="debugBox" class="debug">iniciando…</div></section>
    <div class="footer">Feito por Yruam Käffer + ChatGPT Plus para alegria da rapaziada<br>&lt;3 · v7 CSV turbo</div>
  </main>

<script>
const PUB_ID = '2PACX-1vSsInCRk-l_QEpBvknAIq3Aua_gywvZEi9c95ySWDmUipn3ss6ImJxHqgkx9goZeWyjWEw5FekvCC9m';
const BASE = `https://docs.google.com/spreadsheets/d/e/${PUB_ID}/gviz/tq?tqx=out:csv&headers=1&sheet=`;
const SHEETS = {
  jogos:['Jogos','JOGOS','Tabela','Partidas','Calendário','Calendario','Base Jogos'],
  palpites:['Palpites','PALPITES','Apostas','Bolão','Bolao'],
  rodada:['Desempenho rodada','Desempenho Rodada','DESEMPENHO RODADA','Rodada'],
  dia:['Desempenho dia','Desempenho Dia','DESEMPENHO DIA','Dia']
};
const PARTICIPANTES = ['Junin','Binho','Carlos','Jean','Matheus','Yruam','Rodrigo','Rapha','IA'];
const $ = id => document.getElementById(id);
const norm = s => String(s ?? '').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase().replace(/[^a-z0-9]+/g,' ').trim();
const num = v => { const m = String(v ?? '').replace(',','.').match(/-?\d+(\.\d+)?/); return m ? Number(m[0]) : null; };
const clean = v => String(v ?? '').replace(/^"|"$/g,'').trim();
function log(msg){ $('debugBox').textContent += '\n' + msg; }
function csvParse(text){
  const rows=[]; let row=[], cur='', q=false;
  for(let i=0;i<text.length;i++){ const c=text[i], n=text[i+1];
    if(c==='"' && q && n==='"'){cur+='"';i++;continue}
    if(c==='"'){q=!q;continue}
    if(c===',' && !q){row.push(clean(cur));cur='';continue}
    if((c==='\n'||c==='\r') && !q){ if(c==='\r'&&n==='\n') i++; row.push(clean(cur)); if(row.some(x=>x!=='')) rows.push(row); row=[]; cur=''; continue}
    cur+=c;
  }
  row.push(clean(cur)); if(row.some(x=>x!=='')) rows.push(row); return rows;
}
async function fetchSheet(names){
  for(const name of names){
    const url = BASE + encodeURIComponent(name) + `&cacheBust=${Date.now()}`;
    try{
      const r = await fetch(url,{cache:'no-store'}); const t = await r.text();
      if(!r.ok || /^\s*</.test(t) || /google\.visualization\.Query\.setResponse/.test(t)) throw new Error('resposta inválida');
      const rows = csvParse(t); if(rows.length>1){ log(`✅ aba lida: ${name} (${rows.length} linhas)`); return {name,rows}; }
      throw new Error('aba vazia');
    }catch(e){ log(`⚠️ não li ${name}: ${e.message}`); }
  }
  return {name:null,rows:[]};
}
function toObjects(rows){
  if(!rows.length) return [];
  const headers = rows[0].map((h,i)=> clean(h) || `col${i+1}`);
  return rows.slice(1).map(r=>Object.fromEntries(headers.map((h,i)=>[h,clean(r[i])]))).filter(o=>Object.values(o).some(v=>v));
}
function get(o, keys){
  const entries = Object.entries(o); const wanted = keys.map(norm);
  for(const [k,v] of entries){ const nk=norm(k); if(wanted.some(w=>nk===w || nk.includes(w))) return v; }
  return '';
}
function parseScore(s){
  const m = String(s??'').match(/(\d+)\s*[xX\-:]\s*(\d+)/); return m ? [Number(m[1]),Number(m[2])] : [null,null];
}
function discoverGames(objs){
  return objs.map((o,i)=>{
    let casa=get(o,['casa','mandante','time 1','seleção 1','selecao 1','equipe 1','home']);
    let fora=get(o,['fora','visitante','time 2','seleção 2','selecao 2','equipe 2','away']);
    let placar=get(o,['placar','resultado','score']);
    let [gc,gf]=parseScore(placar);
    if(gc===null){ gc=num(get(o,['gols casa','gc','resultado casa','placar casa'])); gf=num(get(o,['gols fora','gf','resultado fora','placar fora'])); }
    return {
      id:num(get(o,['jogo','id','#','nº','numero'])) ?? i+1,
      rodada:get(o,['rodada','fase']) || '', data:get(o,['data','dia']) || '', hora:get(o,['hora','horario']) || '',
      casa:casa || 'A definir', fora:fora || 'A definir', gc, gf,
      done: gc!==null && gf!==null
    }
  }).filter(g=>g.casa||g.fora||g.data);
}
function guessPoints(gc,gf,pc,pf){
  if([gc,gf,pc,pf].some(v=>v===null || Number.isNaN(v))) return null;
  if(gc===pc && gf===pf) return 10;
  const res = Math.sign(gc-gf), pres = Math.sign(pc-pf);
  let pts = 0;
  if(res===pres) pts += 5;
  if(gc===pc) pts += 2;
  if(gf===pf) pts += 2;
  if((gc-gf)===(pc-pf)) pts += 1;
  return pts;
}
function scanPalpites(rows, games){
  if(rows.length<2) return {bets:[], ranking:[]};
  const bets=[]; const scoreByName=Object.fromEntries(PARTICIPANTES.map(p=>[p,{nome:p,pontos:0,cravadas:0,acertos:0,jogos:0}]));
  const header = rows[0].map(norm);
  const jogoIdx = header.findIndex(h=>['jogo','id','numero','n'].some(x=>h===x||h.includes(x)));
  for(let ri=1; ri<rows.length; ri++){
    const r=rows[ri];
    const maybeId = jogoIdx>=0 ? num(r[jogoIdx]) : (num(r[0]) ?? null);
    const g = games.find(x=>x.id===maybeId) || games[ri-1];
    if(!g) continue;
    PARTICIPANTES.forEach(nome=>{
      const nNome=norm(nome);
      const idxs = header.map((h,i)=>({h,i})).filter(x=>x.h.includes(nNome));
      let pc=null,pf=null,manualPts=null;
      for(const {i} of idxs){
        const val=r[i]; const sc=parseScore(val); if(sc[0]!==null){ pc=sc[0]; pf=sc[1]; }
        const p=num(val); if(/ponto|pts|pontuacao|pont/.test(header[i]) && p!==null) manualPts=p;
        const prox=num(r[i+1]); if(/ponto|pts|pontuacao|pont/.test(header[i+1]||'') && prox!==null) manualPts=prox;
      }
      if(pc===null){
        for(let i=0;i<header.length;i++) if(header[i].includes(nNome)){
          const a=num(r[i]), b=num(r[i+1]); if(a!==null && b!==null){pc=a;pf=b;break}
        }
      }
      const calc = g.done ? guessPoints(g.gc,g.gf,pc,pf) : null;
      const pts = manualPts ?? calc;
      if(pc!==null && pf!==null){
        bets.push({jogo:g.id,nome,pc,pf,pts,calc,manual:manualPts});
        const s=scoreByName[nome]; s.jogos++; if(pts!==null) s.pontos+=pts; if(calc===10 || pts===10) s.cravadas++; if((calc??pts)>0) s.acertos++;
      }
    });
  }
  return {bets, ranking:Object.values(scoreByName).sort((a,b)=>b.pontos-a.pontos || b.cravadas-a.cravadas || b.acertos-a.acertos)};
}
function rankingFromPerformance(objs, fallback){
  if(!objs.length) return fallback;
  const map={};
  objs.forEach(o=>{
    const nome=get(o,['nome','participante','jogador']) || Object.values(o).find(v=>PARTICIPANTES.map(norm).includes(norm(v)));
    if(!nome) return; const canonical=PARTICIPANTES.find(p=>norm(p)===norm(nome)) || nome;
    const pts=num(get(o,['pontos','pts','total','pontuação','pontuacao'])); const cr=num(get(o,['cravadas','placar exato'])); const ac=num(get(o,['acertos','vencedor']));
    if(!map[canonical]) map[canonical]={nome:canonical,pontos:0,cravadas:0,acertos:0,jogos:0};
    if(pts!==null) map[canonical].pontos=Math.max(map[canonical].pontos,pts);
    if(cr!==null) map[canonical].cravadas=Math.max(map[canonical].cravadas,cr);
    if(ac!==null) map[canonical].acertos=Math.max(map[canonical].acertos,ac);
  });
  const arr=Object.values(map).sort((a,b)=>b.pontos-a.pontos || b.cravadas-a.cravadas || b.acertos-a.acertos);
  return arr.length ? arr : fallback;
}
function renderGame(g){
  return `<div class="round">${g.rodada || 'Rodada'}</div><div class="scoreline"><span>${g.casa}</span><span class="score">${g.done?`${g.gc}×${g.gf}`:'×'}</span><span>${g.fora}</span></div><div class="meta"><span>Jogo #${g.id}</span><span>${g.data||''}</span><span>${g.hora||''}</span></div><a class="btn" target="_blank" href="https://ge.globo.com/futebol/copa-do-mundo/">Cobertura da Copa no ge ↗</a>`;
}
function renderBets(bets,last){
  const el=$('lastBets'); el.innerHTML='';
  const list=PARTICIPANTES.map(p=>bets.find(b=>b.jogo===last.id && b.nome===p) || {nome:p,pc:null,pf:null,pts:null});
  list.forEach(b=>{
    const st = b.pts===null ? '<span class="status warn">sem ponto no CSV</span>' : '<span class="status ok">atualizado</span>';
    el.insertAdjacentHTML('beforeend',`<div class="card bet"><div><div class="name">${b.nome}</div><div class="guess">${b.pc!==null?`${b.pc}×${b.pf}`:'—'}</div></div><div style="text-align:right"><div class="pts">${b.pts!==null?b.pts:'—'}</div>${st}</div></div>`);
  });
}
function renderRanking(r){
  $('ranking').innerHTML = r.map((x,i)=>`<div class="card rankrow"><div class="pos">${i+1}</div><div><div class="rankname">${x.nome}</div><div class="rankmeta">${x.cravadas||0} cravadas · ${x.acertos||0} acertos</div></div><div><div class="rankpts">${x.pontos||0}</div><div class="small">pts</div></div></div>`).join('') || '<div class="card">Sem ranking encontrado.</div>';
}
function renderGames(games){
  $('games').innerHTML = games.slice(-18).map(g=>`<div class="game"><div class="gid">#${g.id}<br>${g.data||''}</div><div class="team">${g.casa}</div><div class="time">${g.hora||''}</div><div class="team">${g.fora}</div><div class="time">${g.done?`${g.gc}×${g.gf}`:'—'}</div></div>`).join('');
}
(async function init(){
  $('debugBox').textContent='Diagnóstico do carregamento:';
  const [jogosRaw,palpRaw,rodRaw,diaRaw] = await Promise.all([fetchSheet(SHEETS.jogos),fetchSheet(SHEETS.palpites),fetchSheet(SHEETS.rodada),fetchSheet(SHEETS.dia)]);
  let games = discoverGames(toObjects(jogosRaw.rows));
  if(!games.length && palpRaw.rows.length) games = discoverGames(toObjects(palpRaw.rows));
  games.sort((a,b)=>a.id-b.id);
  const last = [...games].reverse().find(g=>g.done) || games[0] || {id:0,casa:'A definir',fora:'A definir',done:false};
  $('lastGame').classList.remove('loading'); $('lastGame').innerHTML = renderGame(last);
  const {bets,ranking:fallbackRanking} = scanPalpites(palpRaw.rows,games);
  const ranking = rankingFromPerformance([...toObjects(rodRaw.rows),...toObjects(diaRaw.rows)], fallbackRanking);
  renderBets(bets,last); renderRanking(ranking); renderGames(games);
  const ok = [jogosRaw.name,palpRaw.name,rodRaw.name,diaRaw.name].filter(Boolean).length;
  $('sync').textContent = ok ? `CSV ok · ${new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})}` : 'falha ao ler CSV';
  if(!palpRaw.name) log('❌ A aba Palpites não foi encontrada. Publique a planilha inteira na web e confira se a aba chama exatamente Palpites.');
  if(bets.length && bets.every(b=>b.pts===null)) log('⚠️ Palpites foram lidos, mas não achei coluna de pontos. O site calculou somente quando havia placar final. Se os pontos estão na lateral, deixe cabeçalho com “Pontos” ou “Pts”.');
})();
</script>
</body>
</html>
